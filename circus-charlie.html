    // -------------------------------------------------------
    //   POWER-UPS (estrella + cristal slow-mo)
    // -------------------------------------------------------
    drawPowerUp(pu, camera) {
        const ctx = this.ctx;
        const sx = pu.worldX - camera;
        if (sx < -50 || sx > W + 50) return;
        const sy = pu.y + Math.sin(pu.bob) * 4;
        const time = performance.now() / 1000;

        // Aura DOBLE pulsante
        ctx.globalAlpha = 0.15 + Math.sin(time * 4) * 0.1;
        ctx.fillStyle = '#ffee00';
        ctx.beginPath(); ctx.arc(sx, sy, 32, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 0.4;
        ctx.beginPath(); ctx.arc(sx, sy, 20, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;

        // ESTRELLA DORADA con sparkles satelitales
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(pu.spin * 0.5);
        // Sombra
        ctx.fillStyle = '#aa4400';
        this.drawTinyStar(2, 2, 16);
        // Estrella principal con borde
        ctx.fillStyle = '#ffee00';
        this.drawTinyStar(0, 0, 16);
        ctx.strokeStyle = '#ff8800';
        ctx.lineWidth = 1.5;
        this.drawTinyStar(0, 0, 16);
        ctx.stroke();
        // Brillo blanco interno
        ctx.fillStyle = '#ffffff';
        this.drawTinyStar(0, 0, 6);
        ctx.restore();

        // Sparkles orbitales (pequeñas chispitas que giran)
        for (let i = 0; i < 3; i++) {
            const a = pu.spin * 1.5 + i * (Math.PI * 2 / 3);
            const r = 24 + Math.sin(time * 3 + i) * 2;
            const sparkX = sx + Math.cos(a) * r;
            const sparkY = sy + Math.sin(a) * r * 0.6;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(sparkX - 1, sparkY - 1, 2, 2);
            ctx.fillStyle = '#ffee00';
            ctx.fillRect(sparkX, sparkY, 1, 1);
        }
    }
    // -------------------------------------------------------
    //   TRAMPOLÍN (plataforma que catapulta a Charlie)
    // -------------------------------------------------------
    drawTrampoline(tramp, camera) {
        const ctx = this.ctx;
        const sx = tramp.worldX - camera;
        if (sx < -60 || sx > W + 60) return;
        const compress = tramp.compress;
        const time = performance.now() / 1000;
        // Respiración idle sutil cuando no está comprimido
        const idleBob = compress > 0 ? 0 : Math.sin(time * 2.5) * 0.8;
        const yOffset = compress * 4 + idleBob;

        // Aura amarilla pulsante para LLAMAR LA ATENCIÓN
        ctx.globalAlpha = 0.2 + Math.sin(time * 6) * 0.1;
        ctx.fillStyle = '#ffee00';
        ctx.beginPath();
        ctx.ellipse(sx, GROUND_Y - 10, 32, 14, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Patas/postes con sombra
        ctx.fillStyle = '#882200';
        ctx.fillRect(sx - 22, GROUND_Y - 6, 5, 6);
        ctx.fillRect(sx + 17, GROUND_Y - 6, 5, 6);
        ctx.fillStyle = '#440000';
        ctx.fillRect(sx - 22, GROUND_Y - 6, 1, 6);
        ctx.fillRect(sx + 21, GROUND_Y - 6, 1, 6);

        // Plataforma elástica multicapa
        ctx.fillStyle = '#aa1144';
        ctx.fillRect(sx - 22, GROUND_Y - 14 + yOffset, 44, 8);
        ctx.fillStyle = '#ff3366';
        ctx.fillRect(sx - 22, GROUND_Y - 14 + yOffset, 44, 2);
        // Tela negra con rayas
        ctx.fillStyle = '#000';
        for (let i = 0; i < 4; i++) {
            ctx.fillRect(sx - 18 + i * 11, GROUND_Y - 11 + yOffset, 7, 1);
        }
        // Costuras blancas en el borde
        ctx.fillStyle = '#ffffff';
        for (let i = 0; i < 5; i++) {
            ctx.fillRect(sx - 19 + i * 10, GROUND_Y - 14 + yOffset, 1, 1);
            ctx.fillRect(sx - 19 + i * 10, GROUND_Y - 8 + yOffset, 1, 1);
        }
        ctx.strokeStyle = COL.hudYellow;
        ctx.lineWidth = 1;
        ctx.strokeRect(sx - 22, GROUND_Y - 14 + yOffset, 44, 8);

        // Resortes laterales con espiras
        ctx.fillStyle = '#cccccc';
        const springH = 6 - compress * 4;
        ctx.fillRect(sx - 19, GROUND_Y - 6, 3, springH);
        ctx.fillRect(sx + 17, GROUND_Y - 6, 3, springH);
        ctx.fillStyle = '#888';
        for (let i = 0; i < 2; i++) {
            ctx.fillRect(sx - 19, GROUND_Y - 4 - i * 2, 3, 1);
            ctx.fillRect(sx + 17, GROUND_Y - 4 - i * 2, 3, 1);
        }

        // FLECHAS DOBLES amarillas hacia arriba (siempre visibles)
        const arrowBob = Math.sin(time * 5) * 3;
        const ay = GROUND_Y - 30 + arrowBob;
        // Sombra
        ctx.fillStyle = '#000';
        ctx.fillRect(sx - 1, ay + 1, 4, 14);
        ctx.fillRect(sx - 4, ay + 4, 10, 4);
        ctx.fillRect(sx - 6, ay + 7, 14, 4);
        // Flecha principal
        ctx.fillStyle = COL.hudYellow;
        ctx.fillRect(sx - 2, ay, 4, 14);
        ctx.fillRect(sx - 5, ay + 3, 10, 4);
        ctx.fillRect(sx - 7, ay + 6, 14, 4);
        // Brillo en la punta
        ctx.fillStyle = '#fff';
        ctx.fillRect(sx - 1, ay, 2, 4);

        // Segunda flecha más arriba (efecto de rebote)
        const ay2 = ay - 12;
        ctx.fillStyle = '#000';
        ctx.fillRect(sx - 4 + 1, ay2 + 1, 8, 3);
        ctx.fillStyle = '#ff8800';
        ctx.fillRect(sx - 4, ay2, 8, 3);
        ctx.fillRect(sx - 2, ay2 - 2, 4, 2);
    }
    // -------------------------------------------------------
    //   GLOBOS decorativos
    // -------------------------------------------------------
    drawBalloon(ball, camera) {
        if (ball.popped) {
            if (ball.popTimer < 0.4) {
                this.drawBalloonPop(ball, camera);
            }
            return;
        }
        const ctx = this.ctx;
        const sx = ball.worldX - camera;
        if (sx < -30 || sx > W + 30) return;
        const sy = ball.y + Math.sin(ball.bob) * 3;
        // Cuerda
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(sx, sy + 10);
        ctx.lineTo(sx + Math.sin(ball.bob * 1.5) * 3, sy + 22);
        ctx.stroke();
        // Globo
        ctx.fillStyle = ball.color;
        ctx.beginPath();
        ctx.ellipse(sx, sy, 9, 11, 0, 0, Math.PI * 2);
        ctx.fill();
        // Brillo
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(sx - 3, sy - 4, 2, 3, 0, 0, Math.PI * 2);
        ctx.fill();
        // Boquilla
        ctx.fillStyle = '#444';
        ctx.fillRect(sx - 1, sy + 9, 2, 2);
    }
    drawBalloonPop(ball, camera) {
        const ctx = this.ctx;
        const sx = ball.worldX - camera;
        const t = ball.popTimer;
        for (let i = 0; i < 8; i++) {
            const a = (i / 8) * Math.PI * 2;
            const r = t * 60;
            ctx.fillStyle = ball.color;
            ctx.globalAlpha = Math.max(0, 1 - t * 3);
            ctx.fillRect(sx + Math.cos(a) * r - 2, ball.y + Math.sin(a) * r - 2, 4, 4);
        }
        ctx.globalAlpha = 1;
    }
    // -------------------------------------------------------
    //   ÍTEMS (taza de té)
    // -------------------------------------------------------
    drawItem(item, camera) {
        const ctx = this.ctx;
        const x = item.worldX - camera;
        const bob = Math.sin(item.bob) * 2;
        const y = item.y + bob;
        if (x < -50 || x > W + 50) return;
        const flame = item.flameFrame;
        ctx.fillStyle = COL.flameO;
        ctx.fillRect(x - 4, y - 16, 8, 6);
        ctx.fillStyle = COL.flameY;
        if (flame === 0) ctx.fillRect(x - 2, y - 18, 4, 4);
        else if (flame === 1) ctx.fillRect(x - 3, y - 17, 6, 4);
        else ctx.fillRect(x - 1, y - 19, 2, 5);
        ctx.fillStyle = COL.tCup;     ctx.fillRect(x - 8, y - 8, 16, 10);
        ctx.fillStyle = COL.tCupHi;   ctx.fillRect(x - 8, y - 8, 3, 10);
        ctx.fillStyle = COL.tCupLip;  ctx.fillRect(x - 9, y - 10, 18, 2);
        ctx.fillStyle = COL.tTea;     ctx.fillRect(x - 7, y - 9, 14, 2);
        ctx.fillStyle = COL.tCup;     ctx.fillRect(x + 8, y - 6, 3, 6);
        ctx.fillStyle = COL.tCupLip;  ctx.fillRect(x - 10, y + 2, 20, 2);
        ctx.fillStyle = COL.tCup;     ctx.fillRect(x - 9, y + 4, 18, 2);
    }
    // -------------------------------------------------------
    //   HUD
    // -------------------------------------------------------
    drawHUD(game) {
        const ctx = this.ctx;
        // Fondo del HUD con gradiente sutil
        const hg = ctx.createLinearGradient(0, 0, 0, 28);
        hg.addColorStop(0, '#000');
        hg.addColorStop(1, '#1a0033');
        ctx.fillStyle = hg;
        ctx.fillRect(0, 0, W, 28);
        // Borde inferior amarillo
        ctx.fillStyle = COL.hudYellow;
        ctx.fillRect(0, 28, W, 1);
        ctx.font = '11px "Press Start 2P", monospace';
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        const score = String(game.score).padStart(6, '0');
        const hi    = String(game.highScore).padStart(6, '0');
        const stg   = String(game.stageNum).padStart(2, '0');
        ctx.fillStyle = COL.hudWhite;  ctx.fillText('1P', 10, 9);
        ctx.fillStyle = COL.hudYellow; ctx.fillText(score, 38, 9);
        ctx.fillStyle = COL.hudWhite;  ctx.fillText('REC', 180, 9);
        ctx.fillStyle = COL.hudRed;    ctx.fillText(hi, 220, 9);
        ctx.fillStyle = COL.hudCyan;   ctx.fillText('ACTO ' + stg, 360, 9);
        ctx.fillStyle = COL.hudMagenta;
        ctx.fillText('BONO ' + String(Math.max(0, Math.floor(game.bonus))).padStart(4, '0'), 470, 9);
        for (let i = 0; i < game.lives; i++) this.drawLifeIcon(700 + i * 18, 12);

        // ---- INDICADOR DE INVENCIBILIDAD ACTIVA ----
        if (game.player.isInvincible()) {
            const t = game.player.invincibleTimer;
            const colors = ['#ff44aa', '#ffee00', '#00d4ff', '#33ff66'];
            const c = colors[Math.floor(performance.now() / 80) % colors.length];
            ctx.font = '11px "Press Start 2P", monospace';
            ctx.fillStyle = '#000';
            ctx.textAlign = 'left';
            ctx.fillText('★ INVENCIBLE ' + Math.ceil(t) + 's', 11, 51);
            ctx.fillStyle = c;
            ctx.fillText('★ INVENCIBLE ' + Math.ceil(t) + 's', 10, 50);
        }

        // ---- COMBO indicator (debajo del HUD principal) ----
        if (game.combo > 1) {
            const mult = game.getMultiplier();
            const pulse = 1 + Math.sin(performance.now() / 100) * 0.05;
            ctx.save();
            ctx.translate(W/2, 52);
            ctx.scale(pulse, pulse);
            ctx.textAlign = 'center';
            ctx.font = '14px "Press Start 2P", monospace';
            ctx.fillStyle = '#000';
            ctx.fillText(`COMBO ${game.combo} x${mult}`, 2, 2);
            ctx.fillStyle = mult >= 3 ? '#ff44aa' : '#ffee00';
            ctx.fillText(`COMBO ${game.combo} x${mult}`, 0, 0);
            ctx.restore();
            ctx.textAlign = 'left';
        }
        const meters = Math.min(100, Math.floor(game.player.worldX / PX_PER_METER));
        const boxW = 78, boxH = 22;
        const bx = W - boxW - 10, by = H - boxH - 10;
        ctx.fillStyle = '#000'; ctx.fillRect(bx, by, boxW, boxH);
        ctx.strokeStyle = COL.hudRed; ctx.lineWidth = 2; ctx.strokeRect(bx, by, boxW, boxH);
        ctx.fillStyle = COL.hudYellow;
        ctx.textAlign = 'right';
        ctx.font = '14px "Press Start 2P", monospace';
        ctx.fillText(meters + 'M', bx + boxW - 8, by + 5);
        ctx.textAlign = 'left';
    }
    drawLifeIcon(x, y) {
        const ctx = this.ctx;
        ctx.fillStyle = COL.cHair;  ctx.fillRect(x, y - 6, 12, 4);
        ctx.fillStyle = COL.cFace;  ctx.fillRect(x, y - 2, 12, 8);
        ctx.fillStyle = '#000';     ctx.fillRect(x + 3, y + 1, 2, 2); ctx.fillRect(x + 7, y + 1, 2, 2);
        ctx.fillStyle = COL.hudRed; ctx.fillRect(x + 5, y + 4, 2, 1);
    }
    // -------------------------------------------------------
    //   PANTALLAS DE INTERFAZ
    // -------------------------------------------------------
    drawTitleScreen(t) {
        const ctx = this.ctx;
        // Fondo con gradiente vertical (negro arriba, violeta profundo abajo)
        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#000000');
        bg.addColorStop(0.6, '#1a0033');
        bg.addColorStop(1, '#330044');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        // Estrellas titilantes detrás
        this.drawStars(t);

        // Marco de estrellas alternando colores
        const starColors = [COL.hudRed, COL.hudOrange, COL.hudYellow, COL.hudCyan];
        const left = 90, top = 90, right = W - 90, bottom = 260, step = 22;
        const drawStarFrame = (x, y, idx) => {
            const pulse = 1 + Math.sin(t * 4 + idx * 0.5) * 0.15;
            ctx.fillStyle = starColors[idx % starColors.length];
            this.drawTinyStar(x, y, 6 * pulse);
        };
        let idx = 0;
        for (let x = left;  x <= right;  x += step) drawStarFrame(x, top, idx++);
        for (let y = top+step; y <= bottom; y += step) drawStarFrame(right, y, idx++);
        for (let x = right-step; x >= left; x -= step) drawStarFrame(x, bottom, idx++);
        for (let y = bottom-step; y > top; y -= step) drawStarFrame(left, y, idx++);

        ctx.textAlign = 'center';
        // Título con Bungee + múltiples capas de sombra para efecto neón
        ctx.font = '54px "Bungee", "Georgia", serif';
        // Sombra roja
        ctx.fillStyle = '#aa0000';
        ctx.fillText('CIRCUS CHARLIE', W/2 + 4, 170 + 4);
        // Sombra azul
        ctx.fillStyle = '#005588';
        ctx.fillText('CIRCUS CHARLIE', W/2 - 2, 170 - 2);
        // Texto principal cian brillante
        ctx.fillStyle = COL.hudCyan;
        ctx.fillText('CIRCUS CHARLIE', W/2, 170);
        // Outline blanco fino
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.strokeText('CIRCUS CHARLIE', W/2, 170);

        ctx.font = '12px "Press Start 2P", monospace';
        ctx.fillStyle = COL.hudYellow;
        ctx.fillText('¡EL GRAN ESPECTÁCULO DEL CIRCO!', W/2, 215);

        // Charlie+León a la izquierda, Charlie+Caballo a la derecha (animados)
        this.drawCharlieLion(150, 390, Math.floor(t * 8) % 2);
        this.drawCharlieHorse(W - 150, 390, Math.floor(t * 8 + 1) % 2);

        // Mensaje principal con pulse animation
        const pulse = 1 + Math.sin(t * 4) * 0.08;
        if (Math.floor(t * 2) % 2 === 0) {
            ctx.save();
            ctx.translate(W/2, 320);
            ctx.scale(pulse, pulse);
            ctx.font = '18px "Press Start 2P", monospace';
            ctx.fillStyle = '#000';
            ctx.fillText('HAZ CLICK PARA EMPEZAR', 2, 2);
            ctx.fillStyle = COL.hudYellow;
            ctx.fillText('HAZ CLICK PARA EMPEZAR', 0, 0);
            ctx.restore();
        }

        ctx.fillStyle = '#888';
        ctx.font = '8px "Press Start 2P", monospace';
        ctx.fillText('CONTENIDOS Y CREATIVIDAD 3 · UP · 2026', W/2, H - 18);
        ctx.textAlign = 'left';
    }
    drawTinyStar(cx, cy, r) {
        const ctx = this.ctx;
        ctx.beginPath();
        ctx.moveTo(cx, cy - r); ctx.lineTo(cx + r/3, cy - r/3);
        ctx.lineTo(cx + r, cy); ctx.lineTo(cx + r/3, cy + r/3);
        ctx.lineTo(cx, cy + r); ctx.lineTo(cx - r/3, cy + r/3);
        ctx.lineTo(cx - r, cy); ctx.lineTo(cx - r/3, cy - r/3);
        ctx.closePath(); ctx.fill();
    }
    drawHowToScreen(t) {
        const ctx = this.ctx;
        // Fondo gradiente
        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#000');
        bg.addColorStop(1, '#1a0033');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        // Marco decorativo doble
        ctx.strokeStyle = COL.hudYellow;
        ctx.lineWidth = 3;
        ctx.strokeRect(70, 45, W - 140, H - 90);
        ctx.strokeStyle = COL.hudMagenta;
        ctx.lineWidth = 1;
        ctx.strokeRect(76, 51, W - 152, H - 102);

        // Estrellas decorativas en las esquinas
        const cornerColors = [COL.hudRed, COL.hudYellow, COL.hudCyan, COL.hudMagenta];
        const corners = [[70,45],[W-70,45],[70,H-45],[W-70,H-45]];
        for (let i = 0; i < 4; i++) {
            ctx.fillStyle = cornerColors[i];

    // -------------------------------------------------------
    //   PANTALLA DE SELECCIÓN DE PERSONAJE
    // -------------------------------------------------------
    drawCharacterSelect(t, hoveredSide) {
        const ctx = this.ctx;
        // Fondo gradiente
        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#000');
        bg.addColorStop(0.5, '#1a0033');
        bg.addColorStop(1, '#330044');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);
        this.drawStars(t);

        // ===== Título centrado =====
        ctx.textAlign = 'center';
        ctx.font = '26px "Bungee", monospace';
        ctx.fillStyle = '#aa0044';
        ctx.fillText('¡ELIGE A TU COMPAÑERO!', W/2 + 3, 55 + 3);
        ctx.fillStyle = COL.hudYellow;
        ctx.fillText('¡ELIGE A TU COMPAÑERO!', W/2, 55);
        ctx.font = '11px "Press Start 2P", monospace';
        ctx.fillStyle = COL.hudCyan;
        ctx.fillText('¿CON QUIÉN VAS A SALIR A ESCENA?', W/2, 85);

        // ★ Estrellitas decorativas a los lados del título
        ctx.fillStyle = COL.hudYellow;
        const titleStarSize = 5 + Math.sin(t * 5) * 1;
        this.drawTinyStar(W/2 - 180, 55, titleStarSize);
        this.drawTinyStar(W/2 + 180, 55, titleStarSize);

        // ===== Dos tarjetas SIMÉTRICAS =====
        const cardW = 240, cardH = 290;
        const cardY = 110;
        const totalCardsW = cardW * 2;
        const totalGapsW = W - totalCardsW;
        const sideGap = totalGapsW / 3;
        const cardLionX = sideGap;
        const cardHorseX = sideGap * 2 + cardW;

        this.drawCharacterCard(cardLionX, cardY, cardW, cardH, 'EL LEÓN',
                               hoveredSide === 'lion', t, 'lion', false);
        this.drawCharacterCard(cardHorseX, cardY, cardW, cardH, 'EL CABALLO',
                               hoveredSide === 'horse', t, 'horse', true);

        // ===== Indicador "VS" centrado entre cards =====
        // (RESETEAMOS textAlign explícitamente porque las cards lo cambian)
        ctx.textAlign = 'center';
        ctx.font = '28px "Bungee", monospace';
        const vsY = cardY + cardH/2 + 10;
        ctx.fillStyle = '#440000';
        ctx.fillText('VS', W/2 + 3, vsY + 3);
        ctx.fillStyle = '#ff44aa';
        ctx.fillText('VS', W/2, vsY);

        // ===== CTA inferior (centrado correctamente) =====
        if (Math.floor(t * 2) % 2 === 0) {
            const pulse = 1 + Math.sin(t * 5) * 0.06;
            ctx.save();
            ctx.translate(W/2, H - 30);
            ctx.scale(pulse, pulse);
            ctx.textAlign = 'center';  // ← FIX explícito del centrado
            ctx.font = '12px "Press Start 2P", monospace';
            ctx.fillStyle = '#000';
            ctx.fillText('¡APUESTA POR TU CAMPEÓN!', 2, 2);
            ctx.fillStyle = COL.hudWhite;
            ctx.fillText('¡APUESTA POR TU CAMPEÓN!', 0, 0);
            ctx.restore();
        }
        ctx.textAlign = 'left';
    }

    drawCharacterCard(x, y, w, h, label, isHovered, t, animal, mirror) {
        const ctx = this.ctx;
        // Fondo de la tarjeta
        ctx.fillStyle = isHovered ? '#552266' : '#220033';
        ctx.fillRect(x, y, w, h);
        // Borde
        ctx.strokeStyle = isHovered ? COL.hudYellow : '#553355';
        ctx.lineWidth = isHovered ? 4 : 2;
        ctx.strokeRect(x, y, w, h);
        if (isHovered) {
            ctx.save();
            ctx.shadowColor = COL.hudYellow;
            ctx.shadowBlur = 22 + Math.sin(t * 5) * 8;
            ctx.strokeRect(x, y, w, h);
            ctx.restore();
        }
        // Esquinas decorativas
        ctx.fillStyle = COL.hudMagenta;
        ctx.fillRect(x - 4, y - 4, 8, 8);
        ctx.fillRect(x + w - 4, y - 4, 8, 8);
        ctx.fillRect(x - 4, y + h - 4, 8, 8);
        ctx.fillRect(x + w - 4, y + h - 4, 8, 8);

        const cx = x + w/2;

        // ===== LABEL (arriba) =====
        ctx.textAlign = 'center';
        ctx.font = '22px "Bungee", monospace';
        ctx.fillStyle = '#000';
        ctx.fillText(label, cx + 2, y + 36 + 2);
        ctx.fillStyle = isHovered ? COL.hudYellow : COL.hudWhite;
        ctx.fillText(label, cx, y + 36);

        // Línea separadora bajo el label
        ctx.fillStyle = isHovered ? COL.hudYellow : '#553355';
        ctx.fillRect(x + 20, y + 50, w - 40, 1);

        // ===== SPRITE (centrado, bobea) =====
        // El sprite del león/caballo tiene la cola asomando hacia un lado,
        // por eso lo desplazamos un poco para que esté visualmente centrado.
        const bobY = Math.sin(t * 3) * 3;
        const spriteCy = y + 200 + bobY;
        const scale = isHovered ? 2.0 : 1.7;
        const frame = Math.floor(t * 8) % 2;

        ctx.save();
        ctx.translate(cx, spriteCy);
        ctx.scale(scale, scale);
        // Mirror para que el de la derecha mire hacia el centro (face-off)
        if (mirror) ctx.scale(-1, 1);
        // Compensar el centro visual del sprite (cola extiende ~4 px a la der)
        const visualOffsetX = -4;
        if (animal === 'lion') {
            this.drawCharlieLion(visualOffsetX, 0, frame);
        } else {
            this.drawCharlieHorse(visualOffsetX, 0, frame);
        }
        ctx.restore();

        // ===== DESCRIPCIÓN (debajo del sprite) =====
        ctx.textAlign = 'center';
        ctx.font = '8px "Press Start 2P", monospace';
        ctx.fillStyle = isHovered ? COL.hudCyan : '#aaa';
        const desc = animal === 'lion'
            ? ['¡EL REY DE LA SELVA!', 'FEROZ E INDOMABLE']
            : ['¡VELOZ COMO EL RAYO!', 'NOBLE Y ELEGANTE'];
        ctx.fillText(desc[0], cx, y + 230);
        ctx.fillText(desc[1], cx, y + 246);

        // ===== CTA hover (abajo, con centrado explícito) =====
        if (isHovered) {
            const pulseTxt = 1 + Math.sin(t * 6) * 0.05;
            ctx.save();
            ctx.translate(cx, y + h - 22);
            ctx.scale(pulseTxt, pulseTxt);
            ctx.textAlign = 'center';
            ctx.font = '10px "Press Start 2P", monospace';
            ctx.fillStyle = '#000';
            ctx.fillText('¡ELIJO A ESTE!', 1, 1);
            ctx.fillStyle = COL.hudYellow;
            ctx.fillText('¡ELIJO A ESTE!', 0, 0);
            ctx.restore();
        }
        ctx.textAlign = 'left';
    }

    drawStageStart(stageNum, t) {
        const ctx = this.ctx;
        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#000');
        bg.addColorStop(1, '#220044');

        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = COL.hudCyan;
        ctx.font = '14px "Press Start 2P", monospace';

        ctx.fillStyle = COL.hudYellow;
        ctx.fillText(this._stageTitle(stageNum), W/2, H/2 - 10);

        ctx.fillStyle = COL.hudWhite;
        ctx.font = '10px "Press Start 2P", monospace';

            1: '¡CLICK PARA SALTAR! MANTÉN PARA SALTOS MÁS ALTOS',

        };
        ctx.fillText(hints[stageNum] || '', W/2, H/2 + 35);

    _stageTitle(n) {
        const titles = {
            1: 'AROS DE FUEGO',
            2: 'VALLAS DE MADERA',
            3: 'EL GRAN FINAL'
        };
        return titles[n] || '';
    }
    drawStageClear(stageNum, t, bonusGiven) {
        const ctx = this.ctx;
        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#000');
        bg.addColorStop(1, '#003322');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);
        // Confeti animado en el fondo
        for (let i = 0; i < 40; i++) {
            const a = (i / 40 + t * 0.1) % 1;
            const x = (a * W * 1.3 + i * 137) % W;
            const y = ((t * 60 + i * 79) % H);
            const colors = [COL.hudYellow, COL.hudMagenta, COL.hudCyan, COL.hudOrange, COL.hudGreen];
            ctx.fillStyle = colors[i % colors.length];
            ctx.globalAlpha = 0.6;
            ctx.fillRect(x, y, 4, 4);
        }
        ctx.globalAlpha = 1;
        ctx.textAlign = 'center';
        ctx.font = '34px "Bungee", monospace';
        ctx.fillStyle = '#003311';
        ctx.fillText('¡ACTO ' + stageNum + ' COMPLETO!', W/2 + 3, H/2 - 60 + 3);
        ctx.fillStyle = COL.hudGreen;
        ctx.fillText('¡ACTO ' + stageNum + ' COMPLETO!', W/2, H/2 - 60);

        ctx.font = '18px "Press Start 2P", monospace';
        ctx.fillStyle = COL.hudYellow;
        ctx.fillText('BONO  +' + bonusGiven, W/2, H/2 - 5);

        ctx.fillStyle = COL.hudMagenta;
        ctx.font = '11px "Press Start 2P", monospace';
        const msg = stageNum < 3
            ? '¡TE FALTAN ' + (3 - stageNum) + ' ACTO(S) PARA EL FINAL!'
            : '¡COMPLETASTE TODO EL ESPECTÁCULO!';
        ctx.fillText(msg, W/2, H/2 + 35);
        if (Math.floor(t * 2) % 2 === 0) {
            ctx.fillStyle = COL.hudCyan;
            ctx.font = '12px "Press Start 2P", monospace';
            ctx.fillText('¡PREPÁRATE PARA EL SIGUIENTE ACTO!', W/2, H/2 + 80);
        }
        ctx.textAlign = 'left';
    }
    drawGameOver(score, highScore, t, completed) {
        const ctx = this.ctx;
        ctx.textAlign = 'center';
        if (completed) {
            // ====== PANTALLA DE PREMIO (victoria) ======
            // Fondo dorado festivo
            const bg = ctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, 500);
            bg.addColorStop(0, '#553311');
            bg.addColorStop(0.6, '#220a05');
            bg.addColorStop(1, '#000');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, W, H);

            // Confeti animado cayendo
            for (let i = 0; i < 60; i++) {
                const colors = [COL.hudYellow, COL.hudMagenta, COL.hudCyan, COL.hudOrange, COL.hudGreen, '#fff'];
                const x = (i * 87 + t * 30) % W;
                const y = ((t * 80 + i * 113) % (H + 40)) - 20;
                ctx.fillStyle = colors[i % colors.length];
                ctx.globalAlpha = 0.7;
                ctx.fillRect(x, y, 4, 4);
            }
            ctx.globalAlpha = 1;

            // Marco festivo con estrellas rotando
            const sc = [COL.hudYellow, COL.hudOrange, COL.hudMagenta, COL.hudCyan];
            for (let i = 0; i < 20; i++) {
                const a = (i / 20) * Math.PI * 2 + t * 0.4;
                const rad = 235;
                const px = W/2 + Math.cos(a) * rad;
                const py = H/2 + Math.sin(a) * rad * 0.5;
                const pulse = 1 + Math.sin(t * 4 + i) * 0.3;
                ctx.fillStyle = sc[i % sc.length];
                this.drawTinyStar(px, py, 7 * pulse);
            }

            // Título "¡GANASTE!"
            ctx.font = '56px "Bungee", monospace';
            ctx.fillStyle = '#003311';
            ctx.fillText('¡GANASTE!', W/2 + 4, 110 + 4);
            ctx.fillStyle = COL.hudGreen;
            ctx.fillText('¡GANASTE!', W/2, 110);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
            ctx.strokeText('¡GANASTE!', W/2, 110);

            ctx.font = '14px "Press Start 2P", monospace';
            ctx.fillStyle = COL.hudYellow;
            ctx.fillText('★ ERES LA ESTRELLA DEL CIRCO ★', W/2, 155);

            // Caja del premio
            ctx.fillStyle = '#220033';
            ctx.fillRect(W/2 - 220, 190, 440, 115);
            ctx.strokeStyle = COL.hudYellow;
            ctx.lineWidth = 4;
            ctx.strokeRect(W/2 - 220, 190, 440, 115);
            ctx.strokeStyle = COL.hudMagenta;
            ctx.lineWidth = 1;
            ctx.strokeRect(W/2 - 215, 195, 430, 105);

            ctx.fillStyle = COL.hudMagenta;
            ctx.font = '16px "Press Start 2P", monospace';
            ctx.fillText('¡COMPLETASTE EL CIRCO!', W/2, 220);
            ctx.fillStyle = COL.hudWhite;
            ctx.font = '11px "Press Start 2P", monospace';
            ctx.fillText('¡PROEZA DIGNA DE UNA', W/2, 252);
            ctx.fillText('VERDADERA ESTRELLA!', W/2, 274);

            // Stats
            ctx.fillStyle = COL.hudYellow;
            ctx.font = '12px "Press Start 2P", monospace';
            ctx.fillText('PUNTAJE: ' + String(score).padStart(6, '0'), W/2 - 110, 335);
            ctx.fillStyle = COL.hudCyan;
            ctx.fillText('COMBO MAX: x' + (window.game ? window.game.maxCombo : 0), W/2 + 110, 335);
            ctx.fillStyle = '#aaa';
            ctx.font = '9px "Press Start 2P", monospace';
            ctx.fillText('Récord: ' + String(highScore).padStart(6, '0'), W/2, 360);

            // CTA — solo aparece después de 5s (cuando el click funciona)
            if (t < 5) {
                ctx.fillStyle = '#888';
                ctx.font = '10px "Press Start 2P", monospace';
                ctx.fillText('¡DISFRUTÁ TU VICTORIA!   ' + Math.ceil(5 - t) + 's', W/2, 410);
            } else if (Math.floor(t * 2) % 2 === 0) {
                const pulse = 1 + Math.sin(t * 5) * 0.06;
                ctx.save();
                ctx.translate(W/2, 410);
                ctx.scale(pulse, pulse);
                ctx.textAlign = 'center';
                ctx.font = '12px "Press Start 2P", monospace';
                ctx.fillStyle = '#000';
                ctx.fillText('¡CLICK PARA JUGAR DE NUEVO!', 2, 2);
                ctx.fillStyle = COL.hudWhite;
                ctx.fillText('¡CLICK PARA JUGAR DE NUEVO!', 0, 0);
                ctx.restore();
            }
        } else {
            // ====== PANTALLA DE DERROTA ======
            const bg = ctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, 500);
            bg.addColorStop(0, '#330000');
            bg.addColorStop(1, '#000');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, W, H);

            ctx.font = '60px "Bungee", monospace';
            ctx.fillStyle = '#440000';
            ctx.fillText('¡UPS!', W/2 + 4, 110 + 4);
            ctx.fillStyle = COL.hudRed;
            ctx.fillText('¡UPS!', W/2, 110);

            ctx.fillStyle = COL.hudOrange;
            ctx.font = '13px "Press Start 2P", monospace';
            ctx.fillText('¡CHARLIE NO LLEGÓ A LA META!', W/2, 155);
            ctx.fillStyle = COL.hudWhite;
            ctx.font = '11px "Press Start 2P", monospace';
            ctx.fillText('¡PERO LO INTENTÓ CON TODO!', W/2, 182);

            // Caja
            ctx.fillStyle = '#110000';
            ctx.fillRect(W/2 - 220, 215, 440, 95);
            ctx.strokeStyle = COL.hudRed;
            ctx.lineWidth = 3;
            ctx.strokeRect(W/2 - 220, 215, 440, 95);

            ctx.fillStyle = COL.hudYellow;
            ctx.font = '14px "Press Start 2P", monospace';
            ctx.fillText('PUNTAJE: ' + String(score).padStart(6, '0'), W/2, 248);
            ctx.fillStyle = COL.hudMagenta;
            ctx.font = '11px "Press Start 2P", monospace';
            ctx.fillText('COMBO MAX: x' + (window.game ? window.game.maxCombo : 0), W/2, 275);
            ctx.fillStyle = '#aaa';
            ctx.font = '9px "Press Start 2P", monospace';
            ctx.fillText('Récord: ' + String(highScore).padStart(6, '0'), W/2, 297);

            ctx.fillStyle = COL.hudWhite;
            ctx.font = '12px "Press Start 2P", monospace';
            ctx.fillText('¡EL CIRCO TE ESPERA OTRA VEZ!', W/2, 345);

            // CTA — solo aparece después de 5s
            if (t < 5) {
                ctx.fillStyle = '#888';
                ctx.font = '10px "Press Start 2P", monospace';
                ctx.fillText('TÓMATE UN RESPIRO...   ' + Math.ceil(5 - t) + 's', W/2, 400);
            } else if (Math.floor(t * 2) % 2 === 0) {
                const pulse = 1 + Math.sin(t * 5) * 0.06;
                ctx.save();
                ctx.translate(W/2, 400);
                ctx.scale(pulse, pulse);
                ctx.textAlign = 'center';
                ctx.font = '12px "Press Start 2P", monospace';
                ctx.fillStyle = '#000';
                ctx.fillText('¡CLICK PARA INTENTARLO DE NUEVO!', 2, 2);
                ctx.fillStyle = COL.hudCyan;
                ctx.fillText('¡CLICK PARA INTENTARLO DE NUEVO!', 0, 0);
                ctx.restore();
            }
        }
        ctx.textAlign = 'left';
    }
}

// =================== JUEGO PRINCIPAL =========================
class Game {
    constructor(canvas) {
        this.canvas = canvas;
        this.renderer = new Renderer(canvas);
        this.input = new InputHandler(canvas);
        this.audio = new AudioMgr();
        this.music = new MusicPlayer(this.audio);
        this.particles = new ParticleSystem();
        this.effects = new Effects();
        this.state = 'title';
        this.stateTime = 0;
        this.elapsed = 0;
        this.lastDt = 0;
        // Animal seleccionado por el jugador en la pantalla de selección
        this.selectedAnimal = 'lion';   // 'lion' o 'horse'
        this.hoveredSide = null;        // para feedback visual del hover
        this.player = new Player();
        this.stageNum = 1;
        this.stage = new Stage(1);
        this.score = 0;
        this.highScore = this.loadHi();
        this.bonus = 5000;
        this.lives = 3;
        this.lastMeterTick = 0;
        this.completed = false;
        this.deathDelay = 0;
        this.lastBonusGiven = 0;
        // ---- COMBO SYSTEM ----
        this.combo = 0;
        this.maxCombo = 0;
        this.comboTimer = 0;
        this.lastShownMultiplier = 1;
        this.comboDisplayValue = 0;
        this.comboDisplayTimer = 0;
        // ---- MILESTONES (25M, 50M, 75M) ----
        this.lastMilestone = 0;
        this.milestoneTimer = 0;
        this.milestoneText = '';
        // ---- CLIMAX ----
        this.climaxAnnounced = false;
        this.climaxTimer = 0;
    }
    showMilestone(text) {
        this.milestoneText = text;
        this.milestoneTimer = 2.0;
        this.effects.flash(0.15, '#ffee00');
        this.particles.confetti(this.player.worldX, 80, 30);
    }
    getMultiplier() {
        // x1 (combo 0-2), x2 (3-5), x3 (6-8), x4 (9-11), x5 (12+)
        return Math.min(5, 1 + Math.floor(this.combo / 3));
    }
    onPassSuccess(eventX, eventY, basePoints) {
        this.combo++;
        this.comboTimer = 3.5;
        if (this.combo > this.maxCombo) this.maxCombo = this.combo;
        const mult = this.getMultiplier();
        this.score += basePoints * mult;
        // ¿Subió de nivel el multiplicador?
        if (mult > this.lastShownMultiplier) {
            this.lastShownMultiplier = mult;
            this.comboDisplayValue = mult;
            this.comboDisplayTimer = 1.2;
            this.effects.flash(0.18, '#ffee00');
            this.particles.comboBurst(eventX, eventY);
            this.audio.cheer();
        }
        // Confeti de pase normal
        this.particles.confetti(eventX, eventY, 14);
        this.audio.pass();
    }
    resetCombo() {
        this.combo = 0;
        this.comboTimer = 0;
        this.lastShownMultiplier = 1;
    }
    loadHi() {
        try { return parseInt(localStorage.getItem('circus_hi') || '20000', 10) || 20000; }
        catch (e) { return 20000; }
    }
    saveHi() {
        try { localStorage.setItem('circus_hi', String(this.highScore)); }
        catch (e) {}
    }
    setState(s) { this.state = s; this.stateTime = 0; }
    currentSpeed() {
        if (this.stageNum === 1) return RUN_SPEED_STAGE1;
        if (this.stageNum === 2) return RUN_SPEED_STAGE2;
        return RUN_SPEED_STAGE3;
    }
    update(dt) {
        this.stateTime += dt;
        this.elapsed += dt;
        this.lastDt = dt;
        // Efectos (shake, flash, slowmo) actualizan siempre
        this.effects.update(dt);
        // Slow-motion afecta el dt del gameplay
        const gameDt = dt * this.effects.getSlowFactor();

        if (this.state === 'title') {
            // Pantalla de título: 10 segundos antes de auto-avanzar.
            // El usuario puede saltar con click después de 1 segundo
            // (para que la pantalla no se salte por error al primer click).
            if (this.stateTime > 10) {
                this.setState('howto');
            } else if (this.stateTime > 1 && this.input.jumpPressed()) {
                this.audio.start();      // jingle de inicio
                this.setState('howto');
            }
        }
        else if (this.state === 'howto') {
            if (this.stateTime > 1 && this.input.jumpPressed()) {
                this.setState('characterSelect');
            }
        }
        else if (this.state === 'characterSelect') {
            // Detecta hover según mouse X
            this.hoveredSide = this.input.mouseX < W/2 ? 'lion' : 'horse';
            if (this.stateTime > 0.5 && this.input.jumpPressed()) {
                // Click en lado izq = león, lado der = caballo
                this.selectedAnimal = this.input.mouseX < W/2 ? 'lion' : 'horse';
                this.startStage(1);
            }
        }
        else if (this.state === 'stageStart') {
            // "ACTO X READY" — 3 segundos de anuncio
            if (this.stateTime > 3) {
                this.setState('playing');
                const bpms = { 1: 120, 2: 140, 3: 160 };
                this.music.setBPM(bpms[this.stageNum] || 130);
                this.music.start();
            }
        }
        else if (this.state === 'playing') {
            const runSpeed = this.currentSpeed();
            this.player.update(gameDt, this.input, this.audio, runSpeed);
            this.stage.update(gameDt);
            this.particles.update(dt);   // partículas en tiempo real

            this.bonus -= 50 * gameDt;
            if (this.bonus < 0) this.bonus = 0;

            // Combo timer: si pasa demasiado tiempo sin evento, se rompe
            if (this.combo > 0) {
                this.comboTimer -= dt;
                if (this.comboTimer <= 0) this.resetCombo();
            }
            // Display del combo decae
            if (this.comboDisplayTimer > 0) this.comboDisplayTimer -= dt;

            // POLVO al aterrizar
            if (this.player.justLanded) {
                this.particles.dust(this.player.worldX, GROUND_Y, 6);
            }

            // Decay del milestone display
            if (this.milestoneTimer > 0) this.milestoneTimer -= dt;

            // ============ DETECCIÓN DE MILESTONES (25M, 50M, 75M) ============
            const currentM = Math.floor(this.player.worldX / PX_PER_METER);
            const milestones = [
                { m: 25, text: '¡VAS BIEN!' },
                { m: 50, text: '¡MITAD!' },
                { m: 75, text: '¡CASI LLEGAS!' }
            ];
            for (const ms of milestones) {
                if (currentM >= ms.m && this.lastMilestone < ms.m) {
                    this.lastMilestone = ms.m;
                    this.showMilestone(ms.text);
                }
            }

            // ============ DETECCIÓN DEL CLIMAX (mini-boss) ===========
            if (!this.climaxAnnounced && this.stage.climaxStartX &&
                this.player.worldX >= this.stage.climaxStartX - 300) {
                this.climaxAnnounced = true;
                this.climaxTimer = 2.5;
                this.effects.flash(0.2, '#ff0033');
                this.particles.confetti(this.player.worldX + 200, 100, 25);
            }
            if (this.climaxTimer > 0) this.climaxTimer -= dt;

            // ============ COLISIÓN CON POWER-UPS (estrella) ============
            const pbForPowerups = this.player.getWorldBounds();
            for (const pu of this.stage.powerups) {
                if (pu.collected) continue;
                if (aabbOverlap(pbForPowerups, pu.getWorldBounds())) {
                    pu.collected = true;
                    this.player.grantInvincibility(5);
                    this.score += 300;
                    this.effects.flash(0.3, '#ffee00');
                    this.particles.comboBurst(pu.worldX, pu.y);
                    this.audio.collect();
                }
            }

            // ============ COLISIÓN CON TRAMPOLINES ============
            for (const tr of this.stage.trampolines) {
                if (this.player.y >= GROUND_Y - 2 && aabbOverlap(pbForPowerups, tr.getZone())) {
                    // Solo activa si Charlie está cayendo o tocando el suelo
                    if (this.player.onGround || this.player.vy > 0) {
                        this.player.superJump(-650);
                        tr.bounce();
                        this.particles.sparks(tr.worldX, GROUND_Y - 10, 14);
                        this.audio.jump();
                    }
                }
            }

            // ============ COLISIÓN CON GLOBOS ============
            for (const ball of this.stage.balloons) {
                if (ball.popped) continue;
                if (aabbOverlap(pbForPowerups, ball.getWorldBounds())) {
                    ball.popped = true;
                    this.score += 50 * this.getMultiplier();
                    this.particles.confetti(ball.worldX, ball.y, 12);
                    this.audio.collect();
                }
            }

            // ============ COLISIÓN AROS DE FUEGO ============
            const pb = this.player.getWorldBounds();
            const camera = this.player.worldX - PLAYER_SCREEN_X;
            for (const hoop of this.stage.hoops) {
                if (hoop.processed) continue;
                if (this.player.worldX >= hoop.worldX) {
                    hoop.processed = true;
                    const collided = aabbOverlap(pb, hoop.getBottomRimCollision());
                    if (collided && !this.player.isInvincible()) {
                        hoop.hit = true;
                        this.onPlayerDeath();
                    } else {
                        // Pasó limpio o atravesó invencible
                        this.particles.sparks(hoop.worldX, hoop.centerY, collided ? 16 : 12);
                        this.onPassSuccess(hoop.worldX, hoop.centerY, collided ? 400 : 200);
                    }
                }
            }

            // ============ COLISIÓN VALLAS ============
            for (const hurdle of this.stage.hurdles) {
                if (hurdle.processed) continue;
                if (this.player.worldX >= hurdle.worldX) {
                    hurdle.processed = true;
                    const collided = aabbOverlap(pb, hurdle.getCollision());
                    if (collided && !this.player.isInvincible()) {
                        hurdle.hit = true;
                        this.onPlayerDeath();
                    } else {
                        this.onPassSuccess(hurdle.worldX, GROUND_Y - hurdle.height,
                                           collided ? 300 : 150);
                    }
                }
            }

            // ============ RECOLECCIÓN DE ÍTEMS ===============
            for (const item of this.stage.items) {
                if (!item.collected && aabbOverlap(pb, item.getWorldBounds())) {
                    item.collected = true;
                    this.score += 100 * this.getMultiplier();
                    this.audio.collect();
                    this.particles.stars(item.worldX, item.y, 10);
                }
            }

            // ============ PUNTOS POR METRO RECORRIDO =========
            const m = Math.floor(this.player.worldX / PX_PER_METER);
            if (m > this.lastMeterTick) {
                this.score += 10 * (m - this.lastMeterTick);
                this.lastMeterTick = m;
            }

            // ============ MUERTE / RESPAWN ===================
            if (this.player.dead) {
                this.deathDelay -= dt;
                if (this.deathDelay <= 0) {
                    this.lives -= 1;
                    if (this.lives <= 0) {
                        if (this.score > this.highScore) {
                            this.highScore = this.score;
                            this.saveHi();
                        }
                        this.completed = false;
                        this.music.stop();
                        this.setState('gameOver');
                    } else {
                        this.player.reset();
                        this.player.worldX = Math.max(0, this.lastMeterTick * PX_PER_METER - 120);
                    }
                }
            }

            // ============ FIN DE NIVEL ========================
            if (this.player.worldX >= STAGE_LENGTH_PX) {
                this.lastBonusGiven = Math.floor(this.bonus);
                this.score += this.lastBonusGiven;
                this.audio.stageClear();
                this.music.stop();
                this.setState('stageClear');
            }
        }
        else if (this.state === 'stageClear') {
            // "¡ACTO X COMPLETO!" — 4 segundos para celebrar
            if (this.stateTime > 4) {
                if (this.stageNum >= 3) {
                    // ¡Terminó los 3 niveles!
                    if (this.score > this.highScore) {
                        this.highScore = this.score;
                        this.saveHi();
                    }
                    this.completed = true;
                    this.setState('gameOver');
                } else {
                    this.startStage(this.stageNum + 1);
                }
            }
        }
        else if (this.state === 'gameOver') {
            // Pantalla final: MÍNIMO 5 segundos visibles (que el público lo vea),
            // luego click para que pase el próximo participante.
            // Si nadie clickea, se queda hasta que alguien lo haga.
            if (this.stateTime > 5 && this.input.jumpPressed()) this.restart();
        }
    }
    onPlayerDeath() {
        this.player.die(this.audio);
        this.deathDelay = 1.4;
        // Juice de impacto
        this.effects.shake(0.6, 8);
        this.effects.flash(0.3, '#ff0000');
        this.effects.slowMo(0.5);
        this.particles.deathBurst(this.player.worldX, this.player.y - 25);
        this.resetCombo();
    }
    startStage(num) {
        this.stageNum = num;
        this.stage = new Stage(num);
        this.player.reset();
        this.bonus = 5000;
        this.lastMeterTick = 0;
        this.deathDelay = 0;
        this.particles.clear();
        this.resetCombo();
        this.music.stop();
        // Reset milestones y climax para el nuevo nivel
        this.lastMilestone = 0;
        this.milestoneTimer = 0;
        this.climaxAnnounced = false;
        this.climaxTimer = 0;
        this.setState('stageStart');
    }
    restart() {
        this.player = new Player();
        this.stageNum = 1;
        this.stage = new Stage(1);
        this.score = 0;
        this.bonus = 5000;
        this.lives = 3;
        this.lastMeterTick = 0;
        this.deathDelay = 0;
        this.completed = false;
        this.particles.clear();
        this.resetCombo();
        this.maxCombo = 0;
        this.music.stop();
        this.setState('title');
    }
    render() {
        const r = this.renderer;
        if (this.state === 'title')      { r.drawTitleScreen(this.stateTime); return; }
        if (this.state === 'howto')      { r.drawHowToScreen(this.stateTime); return; }
        if (this.state === 'characterSelect') {
            r.drawCharacterSelect(this.stateTime, this.hoveredSide);
            return;
        }
        if (this.state === 'stageStart') { r.drawStageStart(this.stageNum, this.stateTime); return; }
        if (this.state === 'stageClear') { r.drawStageClear(this.stageNum, this.stateTime, this.lastBonusGiven); return; }
        if (this.state === 'gameOver')   { r.drawGameOver(this.score, this.highScore, this.stateTime, this.completed); return; }

        const camera = this.player.worldX - PLAYER_SCREEN_X;
        const ctx = r.ctx;

        // ---- Aplicar SCREEN SHAKE (offset global) ----
        const shake = this.effects.getShake();
        ctx.save();
        ctx.translate(shake.x, shake.y);

        r.drawBackground(camera, this.stageNum, this.elapsed, this.lastDt);
        // META al final del nivel
        r.drawGoal(camera, STAGE_LENGTH_PX, this.elapsed);
        // Trampolines y vallas (siempre detrás del player)
        for (const tr of this.stage.trampolines) r.drawTrampoline(tr, camera);
        for (const hurdle of this.stage.hurdles) r.drawHurdle(hurdle, camera);
        // ★ MITAD TRASERA de los aros (Charlie va a quedar "dentro")
        for (const hoop of this.stage.hoops) r.drawHoopHalf(hoop, camera, 'back');
        // Items y power-ups
        for (const item of this.stage.items) if (!item.collected) r.drawItem(item, camera);
        for (const pu of this.stage.powerups) if (!pu.collected) r.drawPowerUp(pu, camera);

        // Sprite del jinete: usa el animal seleccionado por el jugador
        const useHorse = this.selectedAnimal === 'horse';
        if (this.player.dead) {
            r.drawCharlieDeath(PLAYER_SCREEN_X, this.player.y, this.player.deathTimer, useHorse);
        } else {
            // INVENCIBILIDAD: parpadeo arcoíris alrededor
            const inv = this.player.isInvincible();
            if (inv) {
                const colors = ['#ff44aa', '#ffee00', '#00d4ff', '#33ff66'];
                const c = colors[Math.floor(this.elapsed * 12) % colors.length];
                ctx.save();
                ctx.shadowColor = c;
                ctx.shadowBlur = 20;
                if (useHorse) r.drawCharlieHorse(PLAYER_SCREEN_X, this.player.y, this.player.runAnim);
                else r.drawCharlieLion(PLAYER_SCREEN_X, this.player.y, this.player.runAnim);
                ctx.restore();
                // Aura de estrellas que rota
                for (let i = 0; i < 5; i++) {
                    const a = (i / 5) * Math.PI * 2 + this.elapsed * 6;
                    ctx.fillStyle = colors[i % colors.length];
                    r.drawTinyStar(
                        PLAYER_SCREEN_X + Math.cos(a) * 40,
                        this.player.y - 30 + Math.sin(a) * 35, 5
                    );
                }
            } else if (useHorse) {
                r.drawCharlieHorse(PLAYER_SCREEN_X, this.player.y, this.player.runAnim);
            } else {
                r.drawCharlieLion(PLAYER_SCREEN_X, this.player.y, this.player.runAnim);
            }

        }

        // ★ MITAD DELANTERA de los aros (encima de Charlie = pasa POR DENTRO)
        for (const hoop of this.stage.hoops) r.drawHoopHalf(hoop, camera, 'front');

        // ---- PARTÍCULAS (encima del juego, debajo del HUD) ----
        this.particles.draw(ctx, camera);

        ctx.restore();

        // ---- FLASH global (no afectado por shake) ----
        this.effects.drawFlash(ctx);

        // ---- HUD (siempre arriba) ----
        r.drawHUD(this);

        // ---- MILESTONE ANNOUNCEMENT (25M, 50M, 75M) ----
        // Posicionado MÁS ABAJO para no taparse con el combo indicator (y=52)
        if (this.milestoneTimer > 0) {
            const alpha = Math.min(1, this.milestoneTimer);
            const slide = (1 - Math.min(1, this.milestoneTimer / 0.4)) * -30;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.translate(W/2, 115 + slide);
            ctx.textAlign = 'center';
            ctx.font = '36px "Bungee", monospace';
            ctx.fillStyle = '#aa0044';
            ctx.fillText(this.milestoneText, 3, 3);
            ctx.fillStyle = '#ffee00';
            ctx.fillText(this.milestoneText, 0, 0);
            ctx.restore();
            ctx.globalAlpha = 1;
            ctx.textAlign = 'left';
        }

        // ---- CLIMAX ANNOUNCEMENT (mini-boss) ----
        if (this.climaxTimer > 0) {
            const alpha = Math.min(1, this.climaxTimer / 0.5);
            const pulse = 1 + Math.sin(this.elapsed * 10) * 0.1;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.translate(W/2, H/2 - 80);
            ctx.scale(pulse, pulse);
            ctx.textAlign = 'center';
            const titles = {
                1: '¡EL DOMADOR!',
                2: '¡CABALLO BRAVO!',
                3: '¡MAESTRO DE CEREMONIAS!'
            };
            ctx.font = '40px "Bungee", monospace';
            ctx.fillStyle = '#440000';
            ctx.fillText(titles[this.stageNum] || '¡FINAL!', 4, 4);
            ctx.fillStyle = '#ff3344';
            ctx.fillText(titles[this.stageNum] || '¡FINAL!', 0, 0);
            // Subtítulo
            ctx.font = '12px "Press Start 2P", monospace';
            ctx.fillStyle = COL.hudYellow;
            ctx.fillText('¡EL GRAN FINAL!', 0, 32);
            ctx.restore();
            ctx.globalAlpha = 1;
            ctx.textAlign = 'left';
        }

        // ---- COMBO DISPLAY animado ----
        if (this.comboDisplayTimer > 0) {
            const alpha = Math.min(1, this.comboDisplayTimer * 2);
            const scale = 1 + (1 - this.comboDisplayTimer / 1.2) * 0.5;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.translate(W/2, H/2 - 50);
            ctx.scale(scale, scale);
            ctx.textAlign = 'center';
            ctx.font = '52px "Bungee", monospace';
            ctx.fillStyle = '#aa0044';
            ctx.fillText('COMBO x' + this.comboDisplayValue, 4, 4);
            ctx.fillStyle = '#ffee00';
            ctx.fillText('COMBO x' + this.comboDisplayValue, 0, 0);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
            ctx.strokeText('COMBO x' + this.comboDisplayValue, 0, 0);
            ctx.restore();
            ctx.globalAlpha = 1;
            ctx.textAlign = 'left';
        }
    }
}

// =================== MAIN LOOP ===============================
const canvas = document.getElementById('game');
const game = new Game(canvas);
window.game = game;     // accesible para el HUD de game over
let lastT = 0;
function loop(now) {
    if (!lastT) lastT = now;
    const dt = Math.min((now - lastT) / 1000, 1/30);
    lastT = now;
    game.update(dt);
    game.render();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
