<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Circus Charlie - Estilo Famicom</title>
    <!-- Tipografía arcade Google Fonts (fallback a monospace si no carga) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Press Start 2P', monospace;
            /* Fondo atmosférico de carpa de circo nocturna */
            background:
                radial-gradient(ellipse 80% 50% at 50% 0%, #5a0030 0%, transparent 70%),
                radial-gradient(ellipse 60% 80% at 50% 100%, #2a0020 0%, transparent 60%),
                linear-gradient(180deg, #1a0010 0%, #050008 100%);
            background-attachment: fixed;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Capa de halos ambientales (no interactiva) */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 15% 25%, rgba(255, 100, 200, 0.15), transparent 35%),
                radial-gradient(circle at 85% 75%, rgba(255, 220, 80, 0.10), transparent 35%),
                radial-gradient(circle at 50% 50%, rgba(0, 200, 255, 0.05), transparent 60%);
            pointer-events: none;
            z-index: 0;
            animation: ambient-pulse 8s ease-in-out infinite;
        }

        @keyframes ambient-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* === STAGE: contenedor general === */
        .stage {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            max-width: 100vw;
            animation: stage-entrance 1s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        @keyframes stage-entrance {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Reduced motion: respeta la preferencia del usuario */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* === TÍTULO sobre el juego === */
        .marquee-title {
            font-family: 'Bungee', 'Press Start 2P', monospace;
            font-size: clamp(18px, 4.5vh, 36px);
            font-weight: 400;
            letter-spacing: 4px;
            line-height: 1;
            margin: 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .title-text {
            background: linear-gradient(135deg, #ffee00 0%, #ff8800 35%, #ff44aa 65%, #00d4ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter:
                drop-shadow(2px 2px 0 #440011)
                drop-shadow(4px 4px 0 #220008)
                drop-shadow(0 0 12px rgba(255, 220, 100, 0.4));
            animation: title-glow 3s ease-in-out infinite;
        }

        @keyframes title-glow {
            0%, 100% { filter:
                drop-shadow(2px 2px 0 #440011)
                drop-shadow(4px 4px 0 #220008)
                drop-shadow(0 0 12px rgba(255, 220, 100, 0.4)); }
            50% { filter:
                drop-shadow(2px 2px 0 #440011)
                drop-shadow(4px 4px 0 #220008)
                drop-shadow(0 0 30px rgba(255, 220, 100, 0.85)); }
        }

        /* === FRAME tipo carpa de circo con bombillas === */
        .screen-frame {
            position: relative;
            padding: 22px;
            background:
                linear-gradient(180deg, #aa1144 0%, #771030 50%, #441020 100%);
            border-radius: 14px;
            box-shadow:
                inset 0 2px 6px rgba(255, 255, 255, 0.2),
                inset 0 -2px 6px rgba(0, 0, 0, 0.6),
                0 0 60px rgba(255, 100, 180, 0.35),
                0 16px 40px rgba(0, 0, 0, 0.7);
        }

        /* Bombillas tipo marquesina — más sutiles que antes */
        .bulbs {
            position: absolute;
            pointer-events: none;
            background-image:
                radial-gradient(circle 3.5px at 11px 11px, #fff7aa 30%, #ffcc00 55%, transparent 75%);
            filter: drop-shadow(0 0 4px #ffaa00);
            animation: bulb-blink 1.8s ease-in-out infinite;
            opacity: 0.85;
        }
        .bulbs-2 {
            background-image:
                radial-gradient(circle 3.5px at 11px 11px, #ffccff 30%, #ee3399 55%, transparent 75%);
            filter: drop-shadow(0 0 4px #cc3388);
            animation: bulb-blink-2 1.8s ease-in-out infinite;
            opacity: 0.85;
        }

        .bulbs-h {
            left: 22px;
            right: 22px;
            height: 22px;
            background-size: 22px 22px;
            background-repeat: repeat-x;
        }
        .bulbs-v {
            top: 22px;
            bottom: 22px;
            width: 22px;
            background-size: 22px 22px;
            background-repeat: repeat-y;
        }

        .bulbs-top    { top: 0; }
        .bulbs-bot    { bottom: 0; }
        .bulbs-left   { left: 0; }
        .bulbs-right  { right: 0; }

        /* Esquinas decorativas (bombilla grande pero más sutil) */
        .corner {
            position: absolute;
            width: 22px;
            height: 22px;
            background: radial-gradient(circle 5px at 11px 11px, #fff7aa 30%, #ffaa00 60%, transparent 75%);
            filter: drop-shadow(0 0 6px #ffaa00);
            pointer-events: none;
            animation: bulb-blink 1.8s ease-in-out infinite;
            opacity: 0.9;
        }
        .corner-tl { top: 0; left: 0; }
        .corner-tr { top: 0; right: 0; }
        .corner-bl { bottom: 0; left: 0; }
        .corner-br { bottom: 0; right: 0; }

        @keyframes bulb-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.45; }
        }
        @keyframes bulb-blink-2 {
            0%, 100% { opacity: 0.45; }
            50% { opacity: 1; }
        }

        /* La offsets de bombillas 2 (pink) para que estén entre las amarillas */
        .bulbs-2.bulbs-h { background-position: 11px 0; }
        .bulbs-2.bulbs-v { background-position: 0 11px; }

        /* === CANVAS del juego === */
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            cursor: pointer;
            background: #000;
            border-radius: 6px;
            box-shadow:
                inset 0 0 0 2px #000,
                0 0 0 3px rgba(0, 0, 0, 0.8),
                0 0 24px rgba(255, 200, 0, 0.2);
            /* Tamaño responsive 11-23 pulgadas, deja espacio para título y footer */
            width: min(94vw, calc(82vh * 768 / 480));
            height: auto;
            aspect-ratio: 768 / 480;
            position: relative;
            z-index: 1;
        }

        /* === FOOTER con info del evento === */
        .marquee-footer {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(7px, 1.2vh, 10px);
            color: rgba(255, 200, 120, 0.55);
            letter-spacing: 3px;
            text-align: center;
            line-height: 1.5;
            text-transform: uppercase;
        }
        .marquee-footer .accent {
            color: #ffcc44;
            text-shadow: 0 0 8px rgba(255, 180, 0, 0.6);
        }

        /* Estrellas decorativas alrededor del título */
        .title-stars {
            display: inline-block;
            color: #ffee00;
            text-shadow:
                0 0 8px #ffaa00,
                0 0 16px rgba(255, 170, 0, 0.6);
            animation: star-spin 3s linear infinite;
            font-size: 0.7em;
            line-height: 1;
        }
        @keyframes star-spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.25); }
            100% { transform: rotate(360deg) scale(1); }
        }
        /* La estrella derecha gira al revés para variedad */
        .marquee-title .title-stars:last-child {
            animation-direction: reverse;
        }
    </style>
</head>

<script>
/* ============================================================
   CIRCUS CHARLIE - Adaptación estilo Famicom/NES
   Archivo único HTML5 Canvas + JavaScript vanilla
   ============================================================ */

// =================== CONSTANTES GLOBALES =====================
const W = 768;                       // Ancho del canvas
const H = 480;                       // Alto del canvas
const GROUND_Y = 410;                // Y donde están los pies de Charlie+León
const PLAYER_SCREEN_X = 200;         // X fija de Charlie en pantalla (tercio izquierdo)

// Velocidades de scroll por nivel (progresión real de dificultad)
const RUN_SPEED_STAGE1 = 140;        // px/s — fácil (intro: león + aros)
const RUN_SPEED_STAGE2 = 175;        // px/s — medio (NUEVA mecánica: caballo + vallas)
const RUN_SPEED_STAGE3 = 200;        // px/s — DIFÍCIL (mix de obstáculos al ritmo más rápido)

// Física del salto. Pico ≈ 80 px, duración total ≈ 0.8 s (más hangtime).
const JUMP_VEL = -400;               // px/s (velocidad inicial vertical)
const GRAVITY  = 1000;               // px/s²  (gravedad más suave = más tiempo en el aire)

// Tamaños VISUALES del sprite Charlie+León
const PL_HALF_W   = 22;
const PL_HEIGHT   = 56;

// Tamaños de COLISIÓN del player (forgiveness — más pequeño que el sprite)
const PL_COL_HALF_W = 12;
const PL_COL_HEIGHT = 36;

// Aros de fuego — dimensiones VISUALES (elipse vertical 70 × 110)
const HOOP_VIS_HALF_W = 35;          // ancho visual = 70 px
const HOOP_VIS_HALF_H = 55;          // alto visual  = 110 px
const HOOP_STROKE_OUT = 8;           // grosor stroke naranja
const HOOP_STROKE_IN  = 3;           // grosor stroke amarillo

// Aros de fuego — dimensiones de COLISIÓN (mucho más pequeñas = más forgiveness)
const HOOP_COL_HALF_W = 16;          // ancho colisión = 32 px (vs 70 visual → 54% más chico)
const HOOP_COL_HALF_H = 25;          // alto colisión  = 50 px (vs 110 visual → 55% más chico)
const HOOP_COL_RIM    = 4;

// Longitud del nivel y conversión a metros (1 metro = 30 px → 100M = 3000 px)
const STAGE_LENGTH_PX = 3000;
const PX_PER_METER    = 30;

// =================== PALETA DE COLORES NES ===================
const COL = {
    sky:           '#000000',
    carpaOrange:   '#ff7a00',
    carpaRed:      '#cc1010',
    carpaWhite:    '#ffffff',
    carpaBorder:   '#440000',
    festoonCyan:   '#00d4ff',
    festoonPink:   '#ff44aa',
    festoonWhite:  '#ffeeee',
    festoonRope:   '#aa8800',
    tentRed:       '#aa0011',
    tentDark:      '#550000',
    tentPole:      '#cccccc',
    elephantGray:  '#a0a0a0',
    elephantDark:  '#555555',

    groundGreen:   '#1a7a1a',
    groundLine:    '#2db32d',
    groundDark:    '#0a3a0a',

    cHair:   '#ff66aa',
    cFace:   '#ffcc99',
    cBody:   '#0099ff',
    cDetail: '#ffffff',
    cLeg:    '#ffaadd',
    cShoe:   '#aa3300',
    cEye:    '#000000',

    lBody:   '#aa4422',
    lMane:   '#661100',
    lManeL:  '#883300',
    lBelly:  '#dd6633',
    lDark:   '#330000',

    hOrange: '#FF8C00',
    hYellow: '#FFD700',
    hSpark:  '#ffff88',
    hSupport:'#aa44ff',
    hSupDark:'#661199',

    tCup:    '#ee2244',
    tCupHi:  '#ff6688',
    tCupLip: '#ffffff',
    tTea:    '#884422',
    flameO:  '#ff6600',
    flameY:  '#ffee00',

    hudWhite:   '#ffffff',
    hudYellow:  '#ffee00',
    hudMagenta: '#ff44aa',
    hudRed:     '#cc0000',
    hudCyan:    '#00e5ff',
    hudGreen:   '#33ff66',
    hudOrange:  '#ff8800'
};

// =================== INPUT HANDLER (mouse + touch) ===========
// La consigna del proyecto requiere interacción con mouse. Implementamos:
//   - mousedown / touchstart  → genera evento "jumpPressed" (edge-trigger)
//   - mouseup / touchend      → libera (para variable jump)
// La detección funciona en TODO el canvas: el jugador hace click donde quiera.
class InputHandler {
    constructor(canvas) {
        this.held = false;
        this.edge = false;
        this.mouseX = 0;
        this.mouseY = 0;
        this.canvas = canvas;
        const updatePos = (clientX, clientY) => {
            const rect = canvas.getBoundingClientRect();
            // Considerar el escalado CSS del canvas (responsive)
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            this.mouseX = (clientX - rect.left) * scaleX;
            this.mouseY = (clientY - rect.top) * scaleY;
        };
        const press = (e) => {
            const t = e.touches ? e.touches[0] : e;
            updatePos(t.clientX, t.clientY);
            if (!this.held) this.edge = true;
            this.held = true;
            e.preventDefault();
        };
        const release = (e) => {
            this.held = false;
            if (e) e.preventDefault();
        };
        canvas.addEventListener('mousedown', press);
        canvas.addEventListener('mouseup', release);
        canvas.addEventListener('mouseleave', release);
        canvas.addEventListener('mousemove', (e) => updatePos(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', press, { passive: false });
        canvas.addEventListener('touchend', release, { passive: false });
        canvas.addEventListener('touchmove', (e) => {
            if (e.touches[0]) updatePos(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
    }
    isHeld() { return this.held; }
    jumpPressed() {
        const v = this.edge;
        this.edge = false;
        return v;
    }
}

// =================== AUDIO (SFX con Web Audio API) ===========
// ⚠️ NOTA: la consigna pide "sin sonidos" — esto está habilitado por
// elección del usuario. Si querés desactivarlo, simplemente cambiá
// AudioMgr.enabled a false en el constructor.
class AudioMgr {
    constructor() {
        this.ctx = null;
        this.enabled = true;          // ← cambiá a false para silenciar todo
        this.masterVolume = 0.7;
    }
    ensureCtx() {
        if (!this.ctx) {
            try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
            catch (e) { this.enabled = false; }
        }
        // Web Audio requiere un gesto del usuario antes de sonar
        if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
    }
    tone(freq, dur, type = 'square', vol = 0.08) {
        if (!this.enabled) return;
        this.ensureCtx();
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(vol * this.masterVolume, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
        osc.connect(gain).connect(this.ctx.destination);
        osc.start(now);
        osc.stop(now + dur);
    }
    // Efecto de salto: beep agudo corto
    jump()       { this.tone(660, 0.10, 'square', 0.08); }
    // Taza recogida: 2 tonos ascendentes (ding!)
    collect()    {
        this.tone(1320, 0.06, 'square', 0.10);
        setTimeout(()=>this.tone(1760, 0.10, 'square', 0.10), 60);
    }
    // Aro pasado limpio: 2 tonos rápidos
    pass()       {
        this.tone(880, 0.05, 'square', 0.07);
        setTimeout(()=>this.tone(1175, 0.08, 'square', 0.08), 50);
    }
    // Muerte: descenso grave (sawtooth)
    death()      {
        this.tone(200, 0.30, 'sawtooth', 0.12);
        setTimeout(()=>this.tone(100, 0.40, 'sawtooth', 0.12), 200);
    }
    // Nivel completo: arpegio ascendente
    stageClear() {
        const notes = [523, 659, 784, 1047, 1319];
        notes.forEach((n, i) =>
            setTimeout(() => this.tone(n, 0.15, 'square', 0.10), i * 110));
    }
    // Inicio del juego: 2 tonos brillantes
    start()      {
        this.tone(880, 0.08, 'square', 0.10);
        setTimeout(()=>this.tone(1320, 0.12, 'square', 0.10), 80);
    }
    // Aplauso simulado al subir combo
    cheer()      {
        this.tone(800, 0.05, 'square', 0.05);
        setTimeout(()=>this.tone(1100, 0.06, 'square', 0.05), 40);
        setTimeout(()=>this.tone(1400, 0.08, 'square', 0.06), 90);
    }
}

// =================== MUSIC PLAYER (chiptune loopeado) ========
// Reproductor con scheduling preciso de Web Audio.
// Melodía (square) + bajo (triangle) loopeados. BPM cambia por nivel.
class MusicPlayer {
    constructor(audioMgr) {
        this.audio = audioMgr;
        this.playing = false;
        this.bpm = 130;
        this.beat = 0;
        this.nextBeatTime = 0;
        this.timerId = null;
        // Melodía pegadiza estilo circo (16 corcheas) en C mayor
        this.melody = [
            {f: 523, d: 0.5}, {f: 659, d: 0.5}, {f: 784, d: 0.5}, {f: 1047, d: 1.0},
            {f: 880, d: 0.5}, {f: 784, d: 0.5}, {f: 659, d: 1.0},
            {f: 0,   d: 0.5},
            {f: 587, d: 0.5}, {f: 740, d: 0.5}, {f: 880, d: 0.5}, {f: 1175, d: 1.0},
            {f: 988, d: 0.5}, {f: 880, d: 0.5}, {f: 740, d: 1.0},
            {f: 0,   d: 0.5},
        ];
        // Bajo (do2, sol2, etc.)
        this.bass = [
            131, 131, 131, 131, 196, 196, 196, 131,
            147, 147, 147, 147, 196, 196, 220, 147,
        ];
        this.melodyIdx = 0;
        this.bassIdx = 0;
    }
    setBPM(bpm) { this.bpm = bpm; }
    start() {
        if (this.playing || !this.audio.enabled) return;
        this.audio.ensureCtx();
        if (!this.audio.ctx) return;
        this.playing = true;
        this.melodyIdx = 0;
        this.bassIdx = 0;
        this.nextBeatTime = this.audio.ctx.currentTime + 0.1;
        this.scheduler();
    }
    stop() {
        this.playing = false;
        if (this.timerId) { clearTimeout(this.timerId); this.timerId = null; }
    }
    scheduler() {
        if (!this.playing) return;
        const ctx = this.audio.ctx;
        if (!ctx) return;
        const beatSec = 60 / this.bpm / 2;     // corcheas
        const ahead = 0.15;
        // Schedule todas las notas que entren en la próxima ventana de tiempo
        while (this.nextBeatTime < ctx.currentTime + ahead) {
            // Melodía (square)
            const note = this.melody[this.melodyIdx];
            if (note.f > 0) {
                this.playAt(note.f, this.nextBeatTime, beatSec * note.d * 0.9, 'square', 0.04);
            }
            // Bajo (triangle, suena cada beat)
            const bassNote = this.bass[this.bassIdx];
            this.playAt(bassNote, this.nextBeatTime, beatSec * 0.45, 'triangle', 0.07);
            // Avanzamos índices
            this.nextBeatTime += beatSec * note.d;
            this.melodyIdx = (this.melodyIdx + 1) % this.melody.length;
            this.bassIdx = (this.bassIdx + 1) % this.bass.length;
        }
        this.timerId = setTimeout(() => this.scheduler(), 80);
    }
    playAt(freq, when, dur, type, vol) {
        const ctx = this.audio.ctx;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, when);
        gain.gain.linearRampToValueAtTime(vol * this.audio.masterVolume, when + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, when + dur);
        osc.connect(gain).connect(ctx.destination);
        osc.start(when);
        osc.stop(when + dur + 0.05);
    }
}

// =================== PLAYER (Charlie + León) =================
class Player {
    constructor() { this.reset(); }
    reset() {
        this.worldX = 0;
        this.y = GROUND_Y;
        this.vy = 0;
        this.onGround = true;
        this.dead = false;
        this.deathTimer = 0;
        this.runAnim = 0;
        this.animTimer = 0;
        this.justLanded = false;
        this.jumpCutAvailable = false;
        // Power-up único: invencibilidad (estrella)
        this.invincibleTimer = 0;
    }
    isInvincible() { return this.invincibleTimer > 0; }
    grantInvincibility(seconds = 5) { this.invincibleTimer = seconds; }
    superJump(velocity) {
        this.vy = velocity;
        this.onGround = false;
        this.jumpCutAvailable = false;
    }
    update(dt, input, audio, runSpeed) {
        this.justLanded = false;
        // Decrementa timers de power-up
        if (this.invincibleTimer > 0) this.invincibleTimer -= dt;
        if (this.dead) {
            this.deathTimer += dt;
            this.vy += GRAVITY * dt;
            this.y += this.vy * dt;
            this.worldX -= 30 * dt;
            return;
        }
        this.worldX += runSpeed * dt;

        // ---- SALTO ----
        if (input.jumpPressed() && this.onGround) {
            this.vy = JUMP_VEL;
            this.onGround = false;
            this.jumpCutAvailable = true;
            audio.jump();
        }
        // VARIABLE JUMP: si el jugador suelta el click mientras sube,
        // se corta la velocidad → salto más corto (mejor control)
        if (this.jumpCutAvailable && this.vy < 0 && !input.isHeld()) {
            this.vy *= 0.4;
            this.jumpCutAvailable = false;
        }

        // ---- GRAVEDAD ----
        if (!this.onGround) {
            this.vy += GRAVITY * dt;
            this.y += this.vy * dt;
            if (this.y >= GROUND_Y) {
                this.y = GROUND_Y;
                this.vy = 0;
                this.onGround = true;
                this.justLanded = true;   // ¡aterrizó! spawn dust en Game
                this.jumpCutAvailable = false;
            }
        }
        // Anim
        this.animTimer += dt;
        if (this.animTimer > 0.08) {
            this.runAnim = 1 - this.runAnim;
            this.animTimer = 0;
        }
    }
    die(audio) {
        if (this.dead) return;
        this.dead = true;
        this.vy = -260;
        this.deathTimer = 0;
        audio.death();
    }
    getWorldBounds() {
        return {
            left:   this.worldX - PL_COL_HALF_W,
            right:  this.worldX + PL_COL_HALF_W,
            top:    this.y - PL_COL_HEIGHT,
            bottom: this.y
        };
    }
}

// =================== AROS DE FUEGO ===========================
class FireHoop {
    constructor(worldX, level = 0) {
        this.worldX = worldX;
        this.level = level;
        // Y del centro del aro: 55 / 72 px sobre el suelo (más bajo = salto más chico basta)
        this.centerY = GROUND_Y - (level === 0 ? 55 : 72);
        this.processed = false;
        this.hit = false;
        this.flameTimer = 0;
        this.flameFrame = 0;
        this.flamePhase = Math.random() * Math.PI * 2;
    }
    update(dt) {
        this.flameTimer += dt;
        this.flamePhase += dt * 5;
        if (this.flameTimer > 0.07) {
            this.flameFrame = (this.flameFrame + 1) & 3;
            this.flameTimer = 0;
        }
    }
    // SOLO el rim INFERIOR del aro es letal (forgiveness).
    getBottomRimCollision() {
        return {
            left:   this.worldX - HOOP_COL_HALF_W,
            right:  this.worldX + HOOP_COL_HALF_W,
            top:    this.centerY + HOOP_COL_HALF_H - HOOP_COL_RIM,
            bottom: this.centerY + HOOP_COL_HALF_H
        };
    }
    isXOverlapping(playerWorldX) {
        return (playerWorldX + PL_COL_HALF_W >= this.worldX - HOOP_COL_HALF_W) &&
               (playerWorldX - PL_COL_HALF_W <= this.worldX + HOOP_COL_HALF_W);
    }
    isPastPlayer(playerWorldX) {
        return playerWorldX - PL_COL_HALF_W > this.worldX + HOOP_COL_HALF_W;
    }
}

// =================== VALLAS (obstáculo del Stage 3) ==========
// Vallas de madera tipo equitación: dos postes verticales + barra horizontal
// con franjas rojas/azules. Charlie solo debe SALTAR por encima.
class Hurdle {
    constructor(worldX) {
        this.worldX = worldX;
        this.height = 42;            // altura de la valla
        this.halfW  = 14;            // mitad del ancho de colisión
        this.processed = false;
        this.hit = false;
    }
    update(dt) {}
    // Colisión: rectángulo desde el suelo hasta la altura de la valla
    getCollision() {
        return {
            left:   this.worldX - this.halfW + 4,   // 4 px de forgiveness por lado
            right:  this.worldX + this.halfW - 4,
            top:    GROUND_Y - this.height + 8,     // forgiveness vertical
            bottom: GROUND_Y
        };
    }
}

// =================== POWER-UP: ESTRELLA ======================
// Único power-up: invencibilidad 5s. Atravesar obstáculos sin morir.
class PowerUp {
    constructor(worldX, y) {
        this.worldX = worldX;
        this.y = y;
        this.collected = false;
        this.bob = Math.random() * Math.PI * 2;
        this.spin = 0;
    }
    update(dt) {
        this.bob += dt * 3;
        this.spin += dt * 5;
    }
    getWorldBounds() {
        const y = this.y + Math.sin(this.bob) * 4;
        return { left: this.worldX-18, right: this.worldX+18, top: y-18, bottom: y+18 };
    }
}

// =================== TRAMPOLÍN (obstáculo amistoso) ==========
// Cuando Charlie aterriza encima, lo lanza muy alto automáticamente
class Trampoline {
    constructor(worldX) {
        this.worldX = worldX;
        this.compress = 0;        // animación al rebotar
    }
    update(dt) {
        if (this.compress > 0) this.compress = Math.max(0, this.compress - dt * 4);
    }
    // Caja de "contacto" — si Charlie toca esta zona en cualquier dirección, rebota
    getZone() {
        return { left: this.worldX-22, right: this.worldX+22, top: GROUND_Y-15, bottom: GROUND_Y };
    }
    bounce() { this.compress = 1; }
}

// =================== GLOBOS decorativos (touchables) =========
class Balloon {
    constructor(worldX, y, color) {
        this.worldX = worldX;
        this.baseY = y;            // posición original (no se mueve)
        this.y = y;
        this.color = color;
        this.popped = false;
        this.popTimer = 0;
        this.bob = Math.random() * Math.PI * 2;
    }
    update(dt) {
        if (this.popped) { this.popTimer += dt; return; }
        this.bob += dt * 2;
        // Bobea sutilmente pero no se va flotando
        this.y = this.baseY + Math.sin(this.bob) * 4;
    }
    getWorldBounds() {
        return { left: this.worldX-12, right: this.worldX+12, top: this.y-14, bottom: this.y+12 };
    }
}

// =================== ÍTEMS (tazas de té con llama) ===========
class Item {
    constructor(worldX, y) {
        this.worldX = worldX; this.y = y;
        this.collected = false;
        this.flameTimer = 0; this.flameFrame = 0;
        this.bob = Math.random() * Math.PI * 2;
    }
    update(dt) {
        this.flameTimer += dt;
        if (this.flameTimer > 0.10) {
            this.flameFrame = (this.flameFrame + 1) % 3;
            this.flameTimer = 0;
        }
        this.bob += dt * 4;
    }
    getWorldBounds() {
        return { left: this.worldX-12, right: this.worldX+12, top: this.y-16, bottom: this.y+8 };
    }
}

// =================== PARTÍCULAS (juice / efectos) ============
// Sistema simple de partículas con vida limitada. Se reciclan
// dejándolas morir. Usadas para confeti, chispas, polvo, estrellas.
class Particle {
    constructor(x, y, vx, vy, color, life, size = 3, gravity = 200, shrink = false) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.color = color;
        this.life = life;
        this.maxLife = life;
        this.size = size;
        this.gravity = gravity;
        this.shrink = shrink;
    }
    update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vy += this.gravity * dt;
        this.life -= dt;
    }
    dead() { return this.life <= 0; }
}

class ParticleSystem {
    constructor() { this.particles = []; }
    add(p) { this.particles.push(p); }
    clear() { this.particles = []; }
    // Estallido de confeti al pasar un aro
    confetti(x, y, count = 18) {
        const colors = ['#ff44aa','#ffee00','#00e5ff','#33ff66','#ff8800','#ffffff'];
        for (let i = 0; i < count; i++) {
            const a = Math.random() * Math.PI * 2;
            const s = 80 + Math.random() * 160;
            this.add(new Particle(
                x, y,
                Math.cos(a) * s,
                Math.sin(a) * s - 80,
                colors[i % colors.length],
                0.8 + Math.random() * 0.6,
                3 + Math.floor(Math.random() * 3),
                350
            ));
        }
    }
    // Chispas naranjas al cruzar fuego
    sparks(x, y, count = 10) {
        for (let i = 0; i < count; i++) {
            const a = Math.random() * Math.PI * 2;
            const s = 60 + Math.random() * 120;
            this.add(new Particle(
                x, y,
                Math.cos(a) * s,
                Math.sin(a) * s,
                Math.random() < 0.5 ? '#ff8800' : '#ffee00',
                0.4 + Math.random() * 0.3,
                2 + Math.floor(Math.random() * 2),
                100
            ));
        }
    }
    // Polvo al aterrizar
    dust(x, y, count = 6) {
        for (let i = 0; i < count; i++) {
            const dir = i < count/2 ? -1 : 1;
            this.add(new Particle(
                x + dir * 8 + (Math.random()-0.5)*4, y,
                dir * (40 + Math.random() * 60),
                -20 - Math.random() * 40,
                '#bbb',
                0.4 + Math.random() * 0.2,
                4 + Math.floor(Math.random() * 2),
                100
            ));
        }
    }
    // Estrellas doradas al recoger taza
    stars(x, y, count = 8) {
        for (let i = 0; i < count; i++) {
            const a = -Math.PI/2 + (Math.random() - 0.5) * Math.PI;
            const s = 80 + Math.random() * 60;
            this.add(new Particle(
                x, y,
                Math.cos(a) * s,
                Math.sin(a) * s,
                Math.random() < 0.5 ? '#ffee00' : '#ffffff',
                0.5 + Math.random() * 0.3,
                3, 200
            ));
        }
    }
    // Explosión al morir
    deathBurst(x, y) {
        for (let i = 0; i < 25; i++) {
            const a = Math.random() * Math.PI * 2;
            const s = 80 + Math.random() * 200;
            this.add(new Particle(
                x, y,
                Math.cos(a) * s,
                Math.sin(a) * s - 100,
                Math.random() < 0.5 ? '#ff0000' : '#ffee00',
                0.8 + Math.random() * 0.5,
                4, 400
            ));
        }
    }
    // Burst de combo (estrellas amarillas grandes)
    comboBurst(x, y) {
        for (let i = 0; i < 16; i++) {
            const a = Math.random() * Math.PI * 2;
            const s = 100 + Math.random() * 100;
            this.add(new Particle(
                x, y,
                Math.cos(a) * s, Math.sin(a) * s,
                '#ffee00',
                0.7, 5, 100
            ));
        }
    }
    update(dt) {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].update(dt);
            if (this.particles[i].dead()) this.particles.splice(i, 1);
        }
    }
    draw(ctx, camera) {
        for (const p of this.particles) {
            const sx = p.x - camera;
            if (sx < -20 || sx > W + 20) continue;
            const alpha = Math.min(1, p.life / p.maxLife * 1.5);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.fillRect(sx - p.size/2, p.y - p.size/2, p.size, p.size);
        }
        ctx.globalAlpha = 1;
    }
}

// =================== EFECTOS DE PANTALLA =====================
// Maneja screen shake, flash de color, y slow-motion. Estados con timer.
class Effects {
    constructor() {
        this.shakeT = 0;
        this.shakeI = 0;
        this.flashT = 0;
        this.flashMax = 0;
        this.flashColor = '#fff';
        this.slowMoT = 0;
    }
    update(dt) {
        if (this.shakeT > 0) this.shakeT -= dt;
        if (this.flashT > 0) this.flashT -= dt;
        if (this.slowMoT > 0) this.slowMoT -= dt;
    }
    shake(dur, intensity) {
        this.shakeT = dur;
        this.shakeI = intensity;
    }
    flash(dur, color) {
        this.flashT = dur;
        this.flashMax = dur;
        this.flashColor = color;
    }
    slowMo(dur) { this.slowMoT = dur; }
    isSlow() { return this.slowMoT > 0; }
    getSlowFactor() { return this.slowMoT > 0 ? 0.35 : 1.0; }
    getShake() {
        if (this.shakeT <= 0) return { x: 0, y: 0 };
        return {
            x: (Math.random() - 0.5) * this.shakeI * 2,
            y: (Math.random() - 0.5) * this.shakeI * 2
        };
    }
    drawFlash(ctx) {
        if (this.flashT <= 0) return;
        const a = (this.flashT / this.flashMax) * 0.6;
        ctx.globalAlpha = a;
        ctx.fillStyle = this.flashColor;
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = 1;
    }
}

// =================== STAGE (NIVEL) ===========================
class Stage {
    constructor(num) {
        this.num = num;
        this.hoops = [];
        this.hurdles = [];
        this.trampolines = [];        // ¡Saltos automáticos!
        this.powerups = [];           // Estrellas y cristales slow-mo
        this.balloons = [];           // Globos decorativos (touchables = +50)
        this.items = [];
        this.length = STAGE_LENGTH_PX;
        this.generate();
    }
    generate() {
        const startX = 700;
        let x = startX;
        // La zona normal termina antes del climax. Reservamos:
        //   ~600 px para el climax (3 obstáculos rápidos)
        //   ~200 px para acercarse a la meta
        const normalEnd = this.length - 800;

        // ----- ZONA NORMAL (genera obstáculos según el nivel) -----
        if (this.num === 1) {
            const minSpacing = 400, spreadSpacing = 140;
            while (x < normalEnd) {
                this.hoops.push(new FireHoop(x, 0));
                if (Math.random() < 0.75) {
                    const itemY = Math.random() < 0.5 ? GROUND_Y - 25 : GROUND_Y - 90;
                    this.items.push(new Item(x + 160, itemY));
                }
                x += minSpacing + Math.random() * spreadSpacing;
            }
        }
        else if (this.num === 2) {
            const minSpacing = 320, spreadSpacing = 120;
            while (x < normalEnd) {
                this.hurdles.push(new Hurdle(x));
                if (Math.random() < 0.65) {
                    this.items.push(new Item(x + 140, GROUND_Y - 25));
                }
                x += minSpacing + Math.random() * spreadSpacing;
            }
        }
        else if (this.num === 3) {
            const minSpacing = 320, spreadSpacing = 100;
            let lastWasHoop = false;
            while (x < normalEnd) {
                const useHoop = Math.random() < (lastWasHoop ? 0.35 : 0.7);
                if (useHoop) {
                    const level = Math.random() < 0.3 ? 1 : 0;
                    this.hoops.push(new FireHoop(x, level));
                    lastWasHoop = true;
                } else {
                    this.hurdles.push(new Hurdle(x));
                    lastWasHoop = false;
                }
                if (Math.random() < 0.7) {
                    const itemY = Math.random() < 0.5 ? GROUND_Y - 25 : GROUND_Y - 90;
                    this.items.push(new Item(x + 130, itemY));
                }
                x += minSpacing + Math.random() * spreadSpacing;
            }
        }

        // ----- POWER-UP estrella (SOLO 1 por nivel) -----
        // Más estratégico: tenés que decidir cuándo usarlo
        const puX = 1000 + Math.random() * (normalEnd - 1500);
        this.powerups.push(new PowerUp(puX, GROUND_Y - 60 - Math.random() * 25));

        // ----- TRAMPOLINES (1-2 en stage 2 y 3) -----
        if (this.num >= 2) {
            const numTramps = this.num === 2 ? 1 : 2;
            for (let i = 0; i < numTramps; i++) {
                const tx = 1200 + i * 800 + Math.random() * 200;
                if (tx < normalEnd - 200) this.trampolines.push(new Trampoline(tx));
            }
        }

        // (globos eliminados — no aportaban gameplay, solo ruido visual)

        // ===== CLIMAX FINAL (mini-boss): 3 obstáculos en rapid-fire =====
        // Cada nivel tiene su tipo de boss:
        //   1: Domador (3 aros, uno alto al medio)
        //   2: Caballo bravo (3 vallas)
        //   3: Maestro de Ceremonias (aro, valla, aro alto)
        // Spacing 180 px → ~1s entre obstáculos (sensación de urgencia)
        let bx = normalEnd + 100;
        if (this.num === 1) {
            this.hoops.push(new FireHoop(bx, 0));         bx += 180;
            this.hoops.push(new FireHoop(bx, 1));         bx += 180;
            this.hoops.push(new FireHoop(bx, 0));
        } else if (this.num === 2) {
            this.hurdles.push(new Hurdle(bx));            bx += 180;
            this.hurdles.push(new Hurdle(bx));            bx += 180;
            this.hurdles.push(new Hurdle(bx));
        } else if (this.num === 3) {
            this.hoops.push(new FireHoop(bx, 0));         bx += 180;
            this.hurdles.push(new Hurdle(bx));            bx += 180;
            this.hoops.push(new FireHoop(bx, 1));
        }
        // Marcamos dónde empieza el climax (para mostrar anuncio)
        this.climaxStartX = normalEnd + 50;
    }
    update(dt) {
        for (const h of this.hoops)   h.update(dt);
        for (const h of this.hurdles) h.update(dt);
        for (const t of this.trampolines) t.update(dt);
        for (const p of this.powerups) p.update(dt);
        for (const b of this.balloons) b.update(dt);
        for (const it of this.items)  it.update(dt);
    }
}

// =================== HELPERS DE COLISIÓN =====================
function aabbOverlap(a, b) {
    return a.left < b.right && a.right > b.left &&
           a.top  < b.bottom && a.bottom > b.top;
}

// =================== RENDERER ================================
class Renderer {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.ctx.imageSmoothingEnabled = false;
        // ---- SEEDS PARA ELEMENTOS AMBIENTALES ----
        // Paleta SATURADA estilo NES (vibrante sobre fondo negro)
        const audColors = ['#ff2266','#00ddff','#ffee00','#33ee44','#ff8833','#ffffff','#dd1111','#aa44ee','#88ccff','#ff5577','#22ddbb','#ee44cc'];
        const skinColors = ['#ffcc99','#dd9966','#aa6633','#cc8855'];
        this.audienceSeed = [];
        for (let i = 0; i < 160; i++) {
            const row = Math.floor(Math.random() * 4);
            this.audienceSeed.push({
                wx: Math.random() * 2400,
                row: row,
                shirt: audColors[Math.floor(Math.random() * audColors.length)],
                skin: skinColors[Math.floor(Math.random() * skinColors.length)],
                hairCol: audColors[Math.floor(Math.random() * audColors.length)],
                hasHat: Math.random() < (row < 2 ? 0.35 : 0.15),
                phase: Math.random() * Math.PI * 2,
            });
        }
        // Estrellas titilantes en el cielo
        this.starSeed = [];
        for (let i = 0; i < 50; i++) {
            this.starSeed.push({
                x: Math.random() * W,
                y: Math.random() * 75,
                phase: Math.random() * Math.PI * 2,
                size: Math.random() < 0.7 ? 1 : 2
            });
        }
        // Confeti ambiental flotando muy sutil
        this.ambientConfetti = [];
        for (let i = 0; i < 30; i++) {
            this.ambientConfetti.push({
                x: Math.random() * W,
                y: Math.random() * H,
                vx: -10 - Math.random() * 20,
                vy: 15 + Math.random() * 20,
                color: audColors[Math.floor(Math.random() * audColors.length)],
                phase: Math.random() * Math.PI * 2
            });
        }
    }
    clear(color = '#000') { this.ctx.fillStyle = color; this.ctx.fillRect(0, 0, W, H); }

    // -------------------------------------------------------
    //   PÚBLICO en las tribunas (200+ pixels con bob animado)
    // -------------------------------------------------------
    drawAudience(camera, time) {
        const ctx = this.ctx;
        // 4 filas (en vez de 5) con perspectiva descendente
        const rowYs = [92, 118, 148, 182];
        const rowScales = [0.9, 1.0, 1.1, 1.2];
        // Las filas de adelante tapan a las de atrás → ordenamos por row asc
        const sorted = [...this.audienceSeed].sort((a, b) => a.row - b.row);

        for (const a of sorted) {
            let sx = a.wx - (camera * 0.15) % 2400;
            if (sx < -20) sx += 2400;
            if (sx > W + 20) continue;
            const y = rowYs[a.row];
            const scale = rowScales[a.row];
            // OLA MEXICANA viaja lateralmente (dependiente de x)
            const wavePhase = sx * 0.012 - time * 2.5;
            const waveAmt = Math.max(0, Math.sin(wavePhase) * 8) * scale;

            // Dimensiones escaladas
            const headW = Math.round(8 * scale);
            const headH = Math.round(6 * scale);
            const torsoW = headW;
            const torsoH = Math.round(8 * scale);

            // ---- CABEZA ----
            ctx.fillStyle = a.skin;
            ctx.fillRect(sx, y - waveAmt, headW, headH);
            // Pelo
            ctx.fillStyle = a.hairCol;
            ctx.fillRect(sx, y - Math.round(3 * scale) - waveAmt, headW, Math.round(3 * scale));
            // Sombrero
            if (a.hasHat) {
                ctx.fillStyle = a.shirt;
                ctx.fillRect(sx - 1, y - Math.round(5 * scale) - waveAmt, headW + 2, 2);
                ctx.fillRect(sx + 1, y - Math.round(8 * scale) - waveAmt, headW - 2, Math.round(3 * scale));
            }
            // Ojos
            ctx.fillStyle = '#000';
            ctx.fillRect(sx + Math.round(2 * scale), y + 1 - waveAmt, 1, 2);
            ctx.fillRect(sx + Math.round(5 * scale), y + 1 - waveAmt, 1, 2);
            // Sonrisa
            ctx.fillStyle = '#aa0033';
            ctx.fillRect(sx + Math.round(3 * scale), y + Math.round(4 * scale) - waveAmt, 2, 1);

            // ---- TORSO ----
            ctx.fillStyle = a.shirt;
            ctx.fillRect(sx, y + headH - waveAmt, torsoW, torsoH);
            // Línea de sombra en hombros
            ctx.fillStyle = '#000';
            ctx.globalAlpha = 0.25;
            ctx.fillRect(sx, y + headH - waveAmt, torsoW, 1);
            ctx.globalAlpha = 1;

            // ---- BRAZOS LEVANTADOS durante la ola ----
            if (waveAmt > 2.5 * scale) {
                ctx.fillStyle = a.skin;
                const armW = Math.max(2, Math.round(3 * scale));
                // Brazo izq (3 segmentos curvados)
                ctx.fillRect(sx - 3, y + Math.round(4 * scale) - waveAmt, armW, Math.round(4 * scale));
                ctx.fillRect(sx - 4, y + 0 - waveAmt, armW, Math.round(4 * scale));
                ctx.fillRect(sx - 5, y - Math.round(4 * scale) - waveAmt, armW, Math.round(4 * scale));
                // Brazo der
                ctx.fillRect(sx + torsoW, y + Math.round(4 * scale) - waveAmt, armW, Math.round(4 * scale));
                ctx.fillRect(sx + torsoW + 1, y + 0 - waveAmt, armW, Math.round(4 * scale));
                ctx.fillRect(sx + torsoW + 2, y - Math.round(4 * scale) - waveAmt, armW, Math.round(4 * scale));
            }
        }

        // Barandilla decorativa que separa público del escenario
        ctx.fillStyle = '#444';
        ctx.fillRect(0, 210, W, 2);
        ctx.fillStyle = '#888';
        ctx.fillRect(0, 212, W, 1);
    }
    // -------------------------------------------------------
    //   REFLECTORES desde arriba (cones de luz que barren)
    // -------------------------------------------------------
    drawSpotlights(time) {
        const ctx = this.ctx;
        const lights = [
            { srcX: 140, baseTarget: 200 },
            { srcX: W/2, baseTarget: W/2 },
            { srcX: W - 140, baseTarget: W - 200 }
        ];
        for (let i = 0; i < lights.length; i++) {
            const l = lights[i];
            const sweep = Math.sin(time * 0.6 + i * 1.3) * 80;
            const targetX = l.baseTarget + sweep;
            // Cono de luz MÁS SUTIL (0.10 vs 0.18 antes)
            ctx.save();
            const grad = ctx.createLinearGradient(l.srcX, 75, targetX, GROUND_Y);
            grad.addColorStop(0, 'rgba(255,255,200,0.10)');
            grad.addColorStop(1, 'rgba(255,255,200,0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(l.srcX - 10, 75);
            ctx.lineTo(l.srcX + 10, 75);
            ctx.lineTo(targetX + 80, GROUND_Y);
            ctx.lineTo(targetX - 80, GROUND_Y);
            ctx.closePath();
            ctx.fill();
            // Punto brillante del foco
            ctx.fillStyle = '#ffeeaa';
            ctx.fillRect(l.srcX - 3, 73, 6, 4);
            ctx.restore();
        }
    }
    // -------------------------------------------------------
    //   ESTRELLAS en el cielo (titilan)
    // -------------------------------------------------------
    drawStars(time) {
        const ctx = this.ctx;
        for (const s of this.starSeed) {
            const twinkle = (Math.sin(time * 3 + s.phase) + 1) / 2;
            ctx.globalAlpha = 0.25 + twinkle * 0.5;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(s.x, s.y, s.size, s.size);
        }
        ctx.globalAlpha = 1;
    }
    // -------------------------------------------------------
    //   CONFETI AMBIENTAL flotante muy sutil
    // -------------------------------------------------------
    drawAmbientConfetti(dt, time) {
        const ctx = this.ctx;
        for (const c of this.ambientConfetti) {
            c.x += c.vx * dt;
            c.y += c.vy * dt;
            c.x += Math.sin(time + c.phase) * 0.3;
            if (c.y > H) { c.y = -10; c.x = Math.random() * W; }
            if (c.x < -10) c.x = W + 10;
            ctx.globalAlpha = 0.35;
            ctx.fillStyle = c.color;
            ctx.fillRect(c.x, c.y, 3, 3);
        }
        ctx.globalAlpha = 1;
    }

    // -------------------------------------------------------
    //   FONDO DEL CIRCO
    // -------------------------------------------------------
    drawBackground(camera, stageNum, time, dt) {
        const ctx = this.ctx;
        // CIELO PURO NEGRO (estilo arcade original NES)
        // Pequeños tintes solo en stages 2 y 3 para diferenciar
        let skyCol = '#000000';
        let groundTop = '#22aa22', groundBot = '#106610';
        if (stageNum === 2) {
            // Atardecer: piso naranja, cielo casi negro con leve calor
            skyCol = '#0a0000';
            groundTop = '#dd6622'; groundBot = '#883310';
        } else if (stageNum === 3) {
            // Noche: piso violeta profundo, cielo negro puro
            skyCol = '#000010';
            groundTop = '#5533aa'; groundBot = '#220e55';
        }
        ctx.fillStyle = skyCol;
        ctx.fillRect(0, 0, W, GROUND_Y);

        // ESTRELLAS solo en stage 2 (de noche) y stage 1 (cielo de circo)
        if (stageNum !== 3) this.drawStars(time);

        // Carpa decorativa
        this.drawCarpa(camera);
        // Festones
        this.drawFestoons(camera);
        // Público en las tribunas
        this.drawAudience(camera, time);
        // Entrada de carpa con acróbata performando
        this.drawTentEntrance(camera, time);
        // Reflectores (más sutiles ahora)
        this.drawSpotlights(time);

        // SUELO con gradiente
        const grGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
        grGrad.addColorStop(0, groundTop);
        grGrad.addColorStop(1, groundBot);
        ctx.fillStyle = grGrad;
        ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

        // ★ LÍNEAS AMARILLAS BRILLANTES (icónicas del Circus Charlie original)
        ctx.fillStyle = '#ffee00';
        for (let i = 0; i < 5; i++) {
            ctx.fillRect(0, GROUND_Y + 8 + i * 13, W, 3);
        }
        // Borde superior del piso
        ctx.fillStyle = '#000';
        ctx.fillRect(0, GROUND_Y - 2, W, 2);

        // VIÑETA sutil — oscurece esquinas para enfocar al centro
        const vignette = ctx.createRadialGradient(W/2, H/2, W * 0.35, W/2, H/2, W * 0.7);
        vignette.addColorStop(0, 'rgba(0,0,0,0)');
        vignette.addColorStop(1, 'rgba(0,0,0,0.45)');
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, W, GROUND_Y);
    }
    drawCarpa(camera) {
        const ctx = this.ctx;
        const carpaY = 30, carpaH = 40;
        ctx.fillStyle = '#220000';
        ctx.fillRect(0, carpaY, W, carpaH);
        const pw = 24, ph = 20;
        const cols = [COL.carpaOrange, COL.carpaRed, COL.carpaWhite];
        const offset = (camera * 0.2) % pw;
        for (let row = 0; row < 2; row++) {
            const yC = carpaY + 10 + row * ph;
            const shift = (row === 1) ? pw / 2 : 0;
            for (let i = -pw; i < W + pw; i += pw) {
                const cIdx = Math.floor((i + offset + camera*0.2) / pw + row*3) % cols.length;
                const ci = ((cIdx % cols.length) + cols.length) % cols.length;
                ctx.fillStyle = cols[ci];
                const cx = i - offset + shift + pw/2;
                ctx.beginPath();
                ctx.moveTo(cx, yC - 6); ctx.lineTo(cx + 6, yC);
                ctx.lineTo(cx, yC + 6); ctx.lineTo(cx - 6, yC);
                ctx.closePath(); ctx.fill();
            }
        }
        ctx.fillStyle = COL.carpaBorder;
        ctx.fillRect(0, carpaY, W, 4);
        ctx.fillRect(0, carpaY + carpaH - 4, W, 4);
    }
    drawFestoons(camera) {
        const ctx = this.ctx;
        // BANDERINES TRIANGULARES estilo carpa de circo NES original
        // Cuerda horizontal de la que cuelgan triángulos alternando colores
        const fy = 76, fw = 26, fh = 22;
        const colors = ['#ff2266', '#ffee00', '#00ddff', '#33ee44', '#ff8800', '#ffffff'];
        const offset = (camera * 0.25) % fw;
        // Cuerda dorada
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(0, fy - 2, W, 2);

        for (let i = -fw; i < W + fw; i += fw) {
            const x = i - offset;
            const cIdx = Math.floor((x + offset + camera*0.25 + 999*fw) / fw) % colors.length;
            const ci = ((cIdx % colors.length) + colors.length) % colors.length;
            ctx.fillStyle = colors[ci];
            // TRIÁNGULO apuntando hacia abajo
            ctx.beginPath();
            ctx.moveTo(x + 2, fy);
            ctx.lineTo(x + fw - 2, fy);
            ctx.lineTo(x + fw/2, fy + fh);
            ctx.closePath();
            ctx.fill();
            // Línea más oscura del lado derecho (volumen pixel-art)
            ctx.fillStyle = '#000';
            ctx.globalAlpha = 0.25;
            ctx.beginPath();
            ctx.moveTo(x + fw/2, fy + fh);
            ctx.lineTo(x + fw - 2, fy);
            ctx.lineTo(x + fw - 4, fy);
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }
    drawTentEntrance(camera, time) {
        const ctx = this.ctx;
        const period = 1400;
        const px = (-camera * 0.35 + 80) % period;
        const tx = px < 0 ? px + period : px;
        if (tx > W + 200) return;
        const tentX = tx, tentTop = 120, tentH = 230, tentW = 140;
        ctx.fillStyle = COL.tentDark;
        ctx.fillRect(tentX - tentW/2, tentTop, tentW, tentH);
        ctx.fillStyle = COL.tentRed;
        ctx.fillRect(tentX - tentW/2, tentTop, 22, tentH);
        ctx.fillRect(tentX + tentW/2 - 22, tentTop, 22, tentH);
        ctx.fillStyle = '#660000';
        for (let i = 0; i < 3; i++) {
            ctx.fillRect(tentX - tentW/2 + 3 + i*7, tentTop, 2, tentH);
            ctx.fillRect(tentX + tentW/2 - 22 + 3 + i*7, tentTop, 2, tentH);
        }
        ctx.fillStyle = COL.tentRed;
        ctx.beginPath(); ctx.arc(tentX, tentTop, tentW/2, Math.PI, 0); ctx.fill();
        ctx.strokeStyle = COL.carpaWhite; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(tentX, tentTop, tentW/2, Math.PI, 0); ctx.stroke();
        ctx.fillStyle = COL.tentPole;
        ctx.fillRect(tentX - 2, tentTop - 30, 4, 30);
        ctx.fillStyle = COL.carpaWhite;
        ctx.beginPath();
        ctx.moveTo(tentX, tentTop - 30); ctx.lineTo(tentX + 14, tentTop - 25);
        ctx.lineTo(tentX, tentTop - 20); ctx.closePath(); ctx.fill();
        // ACRÓBATA en la entrada (en vez del elefante)
        // Alternamos entre malabarista y equilibrista según posición fija del mundo
        // (así son consistentes cada vez que pasa la misma carpa)
        const performerType = Math.floor((tentX + camera * 0.35) / period);
        if (performerType % 2 === 0) {
            this.drawTentJuggler(tentX, tentTop + tentH - 30, time);
        } else {
            this.drawTentTightrope(tentX, tentTop + tentH - 30, time);
        }
    }

    // Versión compacta del malabarista para dentro de la carpa
    drawTentJuggler(x, baseY, time) {
        const ctx = this.ctx;
        // Piernas (pantalón rayado vertical rojo/blanco)
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(x - 5, baseY - 18, 10, 18);
        ctx.fillStyle = '#cc1010';
        ctx.fillRect(x - 4, baseY - 18, 2, 18);
        ctx.fillRect(x, baseY - 18, 2, 18);
        ctx.fillRect(x + 4, baseY - 18, 1, 18);
        // Pies oscuros
        ctx.fillStyle = '#000';
        ctx.fillRect(x - 5, baseY - 2, 4, 2);
        ctx.fillRect(x + 2, baseY - 2, 4, 2);
        // Cuerpo (chaleco azul con botones dorados)
        ctx.fillStyle = '#0066cc';
        ctx.fillRect(x - 6, baseY - 28, 12, 12);
        ctx.fillStyle = '#ffee00';
        ctx.fillRect(x - 1, baseY - 25, 2, 2);
        ctx.fillRect(x - 1, baseY - 21, 2, 2);
        // Pajarita amarilla
        ctx.fillStyle = '#ffee00';
        ctx.fillRect(x - 3, baseY - 29, 6, 2);
        // Brazos arriba (manos juntas para malabarear)
        ctx.fillStyle = '#0066cc';
        ctx.fillRect(x - 9, baseY - 28, 3, 8);
        ctx.fillRect(x + 6, baseY - 28, 3, 8);
        // Cabeza (skin)
        ctx.fillStyle = '#ffcc99';
        ctx.fillRect(x - 4, baseY - 36, 8, 8);
        // Bigote frondoso
        ctx.fillStyle = '#553311';
        ctx.fillRect(x - 3, baseY - 30, 6, 2);
        // Ojos
        ctx.fillStyle = '#000';
        ctx.fillRect(x - 2, baseY - 33, 1, 2);
        ctx.fillRect(x + 1, baseY - 33, 1, 2);
        // Sombrero de copa
        ctx.fillStyle = '#000';
        ctx.fillRect(x - 5, baseY - 39, 10, 2);
        ctx.fillRect(x - 4, baseY - 45, 8, 6);
        ctx.fillStyle = '#cc1010';
        ctx.fillRect(x - 4, baseY - 42, 8, 1);

        // 3 BOLAS rotando en órbita (¡malabares!)
        const ballColors = ['#ff44aa', '#00d4ff', '#ffee00'];
        for (let i = 0; i < 3; i++) {
            const angle = time * 3.5 + i * (Math.PI * 2 / 3);
            const bx = x + Math.cos(angle) * 14;
            const by = baseY - 42 + Math.abs(Math.sin(angle)) * -10;
            ctx.fillStyle = ballColors[i];
            ctx.fillRect(bx - 3, by - 3, 6, 6);
            // Brillo blanco
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(bx - 2, by - 2, 2, 2);
        }
    }

    // Versión compacta del equilibrista para dentro de la carpa
    drawTentTightrope(x, baseY, time) {
        const ctx = this.ctx;
        // Pequeña cuerda corta debajo de sus pies
        ctx.fillStyle = '#aa8800';
        ctx.fillRect(x - 35, baseY, 70, 2);
        // Sway senoidal
        const sway = Math.sin(time * 1.5) * 4;
        const ax = x + sway;
        // Piernas (uniforme cyan)
        ctx.fillStyle = '#00aaff';
        ctx.fillRect(ax - 3, baseY - 16, 2, 16);
        ctx.fillRect(ax + 1, baseY - 16, 2, 16);
        // Pies sobre la cuerda
        ctx.fillStyle = '#aa3300';
        ctx.fillRect(ax - 4, baseY - 2, 3, 2);
        ctx.fillRect(ax + 1, baseY - 2, 3, 2);
        // Cuerpo (leotardo amarillo)
        ctx.fillStyle = '#ffee00';
        ctx.fillRect(ax - 4, baseY - 28, 8, 12);
        // Volado blanco
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(ax - 5, baseY - 18, 10, 1);
        // Cara skin
        ctx.fillStyle = '#ffcc99';
        ctx.fillRect(ax - 3, baseY - 35, 6, 7);
        // Pelo rosa
        ctx.fillStyle = '#ff44aa';
        ctx.fillRect(ax - 4, baseY - 39, 8, 4);
        ctx.fillRect(ax - 3, baseY - 35, 6, 1);
        // Ojos
        ctx.fillStyle = '#000';
        ctx.fillRect(ax - 2, baseY - 32, 1, 2);
        ctx.fillRect(ax + 1, baseY - 32, 1, 2);
        // Sonrisa
        ctx.fillStyle = '#aa0033';
        ctx.fillRect(ax - 1, baseY - 30, 2, 1);
        // Pértiga de balance horizontal con inclinación opuesta al sway
        const tilt = -sway * 0.4;
        ctx.fillStyle = '#222';
        ctx.fillRect(ax - 28, baseY - 23 + tilt, 56, 2);
        // Pesos rojos en los extremos
        ctx.fillStyle = '#cc1010';
        ctx.fillRect(ax - 32, baseY - 26 + tilt, 6, 6);
        ctx.fillRect(ax + 26, baseY - 26 - tilt, 6, 6);
        // Brillito amarillo
        ctx.fillStyle = '#ffee00';
        ctx.fillRect(ax - 31, baseY - 25 + tilt, 1, 1);
        ctx.fillRect(ax + 27, baseY - 25 - tilt, 1, 1);
    }
    // -------------------------------------------------------
    //   ACRÓBATAS DE FONDO (en la tribuna, con parallax)
    // -------------------------------------------------------
    drawBackgroundPerformers(camera, time, stageNum) {
        const ctx = this.ctx;
        // POSICIÓN: justo debajo de la barandilla de la tribuna (y=222)
        // y arriba de los obstáculos (que empiezan en y~300)
        if (stageNum !== 2) {
            const period = 1800;
            const px = (-camera * 0.45 + 400) % period;
            const tx = px < 0 ? px + period : px;
            if (tx < W + 100) this.drawTightrope(tx, 268, time);
        }
        const periodJ = 1500;
        const pxJ = (-camera * 0.45 + 1100) % periodJ;
        const txJ = pxJ < 0 ? pxJ + periodJ : pxJ;
        if (txJ < W + 80) this.drawJuggler(txJ, 272, time);
    }
    drawTightrope(x, baseY, time) {
        const ctx = this.ctx;
        // Cuerda extendida con postes a los costados
        ctx.fillStyle = '#aa8800';
        ctx.fillRect(x - 90, baseY, 180, 2);
        // Postes laterales con sombra
        ctx.fillStyle = '#553300';
        ctx.fillRect(x - 92, baseY - 4, 4, 22);
        ctx.fillRect(x + 88, baseY - 4, 4, 22);
        // Borla decorativa en los postes
        ctx.fillStyle = '#ff44aa';
        ctx.fillRect(x - 94, baseY - 6, 8, 4);
        ctx.fillRect(x + 86, baseY - 6, 8, 4);

        // Acróbata balanceándose (sway senoidal)
        const sway = Math.sin(time * 1.5) * 5;
        const ax = x + sway;

        // Piernas (uniforme cyan)
        ctx.fillStyle = '#00aaff';
        ctx.fillRect(ax - 3, baseY - 16, 2, 16);
        ctx.fillRect(ax + 1, baseY - 16, 2, 16);
        // Pies sobre la cuerda
        ctx.fillStyle = '#aa3300';
        ctx.fillRect(ax - 4, baseY - 2, 3, 2);
        ctx.fillRect(ax + 1, baseY - 2, 3, 2);
        // Cuerpo (leotardo amarillo)
        ctx.fillStyle = '#ffee00';
        ctx.fillRect(ax - 4, baseY - 28, 8, 12);
        // Volado del leotardo (zigzag)
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(ax - 5, baseY - 18, 10, 1);
        // Cara (skin)
        ctx.fillStyle = '#ffcc99';
        ctx.fillRect(ax - 3, baseY - 35, 6, 7);
        // Pelo rosa con flequillo
        ctx.fillStyle = '#ff44aa';
        ctx.fillRect(ax - 4, baseY - 39, 8, 4);
        ctx.fillRect(ax - 3, baseY - 35, 6, 1);
        // Ojos
        ctx.fillStyle = '#000';
        ctx.fillRect(ax - 2, baseY - 32, 1, 2);
        ctx.fillRect(ax + 1, baseY - 32, 1, 2);
        // Sonrisa
        ctx.fillStyle = '#aa0033';
        ctx.fillRect(ax - 1, baseY - 30, 2, 1);

        // Pertiga de balance horizontal con inclinación opuesta al sway
        const tilt = -sway * 0.4;
        ctx.fillStyle = '#222';
        ctx.fillRect(ax - 32, baseY - 23 + tilt, 64, 2);
        // Pesos rojos en los extremos
        ctx.fillStyle = '#cc1010';
        ctx.fillRect(ax - 36, baseY - 26 + tilt, 6, 6);
        ctx.fillRect(ax + 30, baseY - 26 - tilt, 6, 6);
        // Brillito amarillo en los pesos
        ctx.fillStyle = '#ffee00';
        ctx.fillRect(ax - 35, baseY - 25 + tilt, 1, 1);
        ctx.fillRect(ax + 31, baseY - 25 - tilt, 1, 1);
    }
    drawJuggler(x, baseY, time) {
        const ctx = this.ctx;
        // Pedestal/banquito
        ctx.fillStyle = '#aa1144';
        ctx.fillRect(x - 14, baseY + 24, 28, 8);
        ctx.fillStyle = '#ffee00';
        ctx.fillRect(x - 14, baseY + 22, 28, 2);
        ctx.fillStyle = '#660022';
        ctx.fillRect(x - 14, baseY + 32, 28, 2);

        // Piernas (pantalón rayado vertical rojo/blanco)
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(x - 5, baseY + 4, 10, 18);
        ctx.fillStyle = '#cc1010';
        ctx.fillRect(x - 4, baseY + 4, 2, 18);
        ctx.fillRect(x, baseY + 4, 2, 18);
        ctx.fillRect(x + 4, baseY + 4, 1, 18);

        // Cuerpo (chaleco azul con botones)
        ctx.fillStyle = '#0066cc';
        ctx.fillRect(x - 6, baseY - 6, 12, 12);
        ctx.fillStyle = '#ffee00';
        ctx.fillRect(x - 1, baseY - 3, 2, 2);
        ctx.fillRect(x - 1, baseY + 1, 2, 2);
        // Pajarita amarilla
        ctx.fillStyle = '#ffee00';
        ctx.fillRect(x - 3, baseY - 7, 6, 2);

        // Brazos arriba (manos juntas para malabarear)
        ctx.fillStyle = '#0066cc';
        ctx.fillRect(x - 9, baseY - 6, 3, 8);
        ctx.fillRect(x + 6, baseY - 6, 3, 8);

        // Cabeza (skin)
        ctx.fillStyle = '#ffcc99';
        ctx.fillRect(x - 4, baseY - 14, 8, 8);
        // Bigote frondoso
        ctx.fillStyle = '#553311';
        ctx.fillRect(x - 3, baseY - 8, 6, 2);
        // Ojos
        ctx.fillStyle = '#000';
        ctx.fillRect(x - 2, baseY - 11, 1, 2);
        ctx.fillRect(x + 1, baseY - 11, 1, 2);
        // Sombrero de copa
        ctx.fillStyle = '#000';
        ctx.fillRect(x - 5, baseY - 17, 10, 2);
        ctx.fillRect(x - 4, baseY - 23, 8, 6);
        ctx.fillStyle = '#cc1010';
        ctx.fillRect(x - 4, baseY - 20, 8, 1);

        // 3 BOLAS rotando en órbita (malabares!)
        const ballColors = ['#ff44aa', '#00d4ff', '#ffee00'];
        for (let i = 0; i < 3; i++) {
            const angle = time * 3.5 + i * (Math.PI * 2 / 3);
            const bx = x + Math.cos(angle) * 14;
            const by = baseY - 20 + Math.abs(Math.sin(angle)) * -10;
            ctx.fillStyle = ballColors[i];
            ctx.fillRect(bx - 3, by - 3, 6, 6);
            // Brillo blanco
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(bx - 2, by - 2, 2, 2);
        }
    }
    // -------------------------------------------------------
    //   META FINAL del nivel (banderines + estructura)
    // -------------------------------------------------------
    drawGoal(camera, worldX, time) {
        const ctx = this.ctx;
        const sx = worldX - camera;
        if (sx < -150 || sx > W + 150) return;

        // Aura dorada brillante (atrae la atención)
        ctx.globalAlpha = 0.25 + Math.sin(time * 4) * 0.15;
        ctx.fillStyle = '#ffee00';
        ctx.beginPath();
        ctx.arc(sx, GROUND_Y - 60, 90, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Postes laterales (madera con base)
        ctx.fillStyle = '#8b4513';
        ctx.fillRect(sx - 55, GROUND_Y - 140, 8, 140);
        ctx.fillRect(sx + 47, GROUND_Y - 140, 8, 140);
        // Sombra de los postes
        ctx.fillStyle = '#5a2d0a';
        ctx.fillRect(sx - 55, GROUND_Y - 140, 2, 140);
        ctx.fillRect(sx + 47, GROUND_Y - 140, 2, 140);
        // Base ensanchada
        ctx.fillStyle = '#6b3410';
        ctx.fillRect(sx - 60, GROUND_Y - 8, 14, 8);
        ctx.fillRect(sx + 46, GROUND_Y - 8, 14, 8);

        // Arco superior rojo con franjas blancas (tipo carpa)
        ctx.fillStyle = '#cc0033';
        ctx.fillRect(sx - 60, GROUND_Y - 148, 120, 12);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(sx - 58, GROUND_Y - 145, 116, 2);
        ctx.fillRect(sx - 58, GROUND_Y - 140, 116, 2);
        // Borde dorado del arco
        ctx.strokeStyle = '#ffee00';
        ctx.lineWidth = 2;
        ctx.strokeRect(sx - 60, GROUND_Y - 148, 120, 12);

        // Texto "META" en el arco
        ctx.font = 'bold 14px "Press Start 2P", monospace';
        ctx.fillStyle = '#440011';
        ctx.textAlign = 'center';
        ctx.fillText('META', sx + 1, GROUND_Y - 137);
        ctx.fillStyle = '#ffee00';
        ctx.fillText('META', sx, GROUND_Y - 138);
        ctx.textAlign = 'left';

        // Banderines colgando del arco (cuerda con triangles)
        const flagColors = ['#ff44aa', '#ffee00', '#00d4ff', '#33ff66', '#ff8800', '#ffffff', '#cc1010', '#aa44ff'];
        for (let i = 0; i < 8; i++) {
            const fx = sx - 56 + i * 14;
            const sway = Math.sin(time * 2 + i * 0.4) * 1.2;
            ctx.fillStyle = flagColors[i];
            // Triángulo descendente (3 segmentos)
            ctx.fillRect(fx, GROUND_Y - 132 + sway, 8, 3);
            ctx.fillRect(fx + 1, GROUND_Y - 129 + sway, 6, 3);
            ctx.fillRect(fx + 2, GROUND_Y - 126 + sway, 4, 3);
            ctx.fillRect(fx + 3, GROUND_Y - 123 + sway, 2, 2);
        }
        // Cuerda
        ctx.fillStyle = '#aa8800';
        ctx.fillRect(sx - 56, GROUND_Y - 133, 112, 1);

        // PATRÓN A CUADROS BLANCO/NEGRO (cuadrículas de meta) en el suelo
        for (let row = 0; row < 4; row++) {
            for (let col = 0; col < 10; col++) {
                const isBlack = (row + col) % 2 === 0;
                ctx.fillStyle = isBlack ? '#000' : '#fff';
                ctx.fillRect(sx - 50 + col * 10, GROUND_Y - 4 + row * 1, 10, 1);
            }
        }

        // ESTRELLA dorada gigante pulsante en el centro
        const starSize = 18 + Math.sin(time * 3) * 4;
        ctx.save();
        ctx.translate(sx, GROUND_Y - 75);
        ctx.rotate(time * 0.8);
        ctx.fillStyle = '#aa6600';
        this.drawTinyStar(2, 2, starSize);

        ctx.restore();

        // Pequeños sparkles ascendentes alrededor de la meta
        for (let i = 0; i < 6; i++) {
            const a = time * 0.5 + i * (Math.PI * 2 / 6);
            const r = 60 + Math.sin(time * 2 + i) * 10;

    }

    // -------------------------------------------------------
    //   AROS DE FUEGO — ELIPSE 70×110 con fuego animado
    // -------------------------------------------------------
    drawHoop(hoop, camera) {
        const ctx = this.ctx;
        const x = hoop.worldX - camera;
        const y = hoop.centerY;
        if (x < -120 || x > W + 120) return;

        const w = HOOP_VIS_HALF_W;     // 35
        const h = HOOP_VIS_HALF_H;     // 55

        // Soporte morado superior
        ctx.fillStyle = COL.hSupDark;
        ctx.fillRect(x - 5, y - h - 18, 10, 18);
        ctx.fillStyle = COL.hSupport;
        ctx.fillRect(x - 4, y - h - 17, 8, 16);
        ctx.fillStyle = COL.hSupDark;
        ctx.fillRect(x - 4, y - h - 2, 8, 5);

        // Aura difusa de fuego (resplandor de calor)
        ctx.globalAlpha = 0.20;
        ctx.fillStyle = COL.hOrange;
        ctx.beginPath();
        ctx.ellipse(x, y, w + 10, h + 10, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Stroke EXTERIOR naranja (grueso)
        ctx.strokeStyle = COL.hOrange;
        ctx.lineWidth = HOOP_STROKE_OUT;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.ellipse(x, y, w, h, 0, 0, Math.PI * 2);
        ctx.stroke();

        // Stroke INTERIOR amarillo (más fino)
        ctx.strokeStyle = COL.hYellow;
        ctx.lineWidth = HOOP_STROKE_IN;
        ctx.beginPath();
        ctx.ellipse(x, y, w - 2, h - 2, 0, 0, Math.PI * 2);
        ctx.stroke();

        // Lenguas de fuego irregulares alrededor del aro
        const tongues = 16;
        for (let i = 0; i < tongues; i++) {
            const t = i / tongues;
            const a = t * Math.PI * 2;
            const px = x + Math.cos(a) * w;
            const py = y + Math.sin(a) * h;
            const nx = Math.cos(a);
            const ny = Math.sin(a);
            const len = 4 + (Math.sin(hoop.flamePhase * 2 + i * 0.7) + 1) * 5;
            const isYellow = ((i + hoop.flameFrame) & 1) === 0;
            ctx.strokeStyle = isYellow ? COL.hYellow : COL.hOrange;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(px + nx * len, py + ny * len);
            ctx.stroke();
        }

        // Chispas brillantes
        ctx.fillStyle = COL.hSpark;
        const sparkPositions = [
            [-w * 0.6, -h * 0.85], [w * 0.6, -h * 0.85],
            [-w * 0.9, 0],         [w * 0.9, 0],
            [-w * 0.6, h * 0.85],  [w * 0.6, h * 0.85]
        ];
        for (let i = 0; i < sparkPositions.length; i++) {
            if (((i + hoop.flameFrame) & 1) === 0) {
                const [sx, sy] = sparkPositions[i];
                ctx.fillRect(x + sx - 1, y + sy - 1, 3, 3);
            }
        }

        // ★ ESTRELLA CENTRAL pulsante (indica el "ojo del aro")
        const pulseT = performance.now() / 1000;
        const pulseSize = 5 + Math.sin(pulseT * 4) * 2;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(hoop.flamePhase * 0.5);
        ctx.fillStyle = '#ffee00';
        this.drawTinyStar(0, 0, pulseSize);
        ctx.fillStyle = '#ffffff';
        this.drawTinyStar(0, 0, pulseSize * 0.5);
        ctx.restore();
    }
    // ---- Versión SPLIT del aro para que Charlie pase POR DENTRO ----
    // Dibuja solo la mitad indicada (back = atrás del player, front = adelante)
    drawHoopHalf(hoop, camera, side) {
        const ctx = this.ctx;
        const x = hoop.worldX - camera;
        // Si el aro está fuera de pantalla, no usamos clip (no hace falta)
        if (x < -120 || x > W + 120) return;
        ctx.save();
        ctx.beginPath();
        // Split en el centro X del aro:
        //   'back'  = mitad IZQUIERDA (Charlie todavía no la cruzó)
        //   'front' = mitad DERECHA (Charlie está por cruzar/saliendo)
        if (side === 'back') {
            ctx.rect(0, 0, x, H);
        } else {
            ctx.rect(x, 0, W - x, H);
        }
        ctx.clip();
        this.drawHoop(hoop, camera);
        ctx.restore();
    }

    drawHurdle(hurdle, camera) {
        const ctx = this.ctx;
        const x = hurdle.worldX - camera;
        if (x < -50 || x > W + 50) return;
        const y = GROUND_Y;
        const h = hurdle.height;
        const time = performance.now() / 1000;

        // Postes verticales (marrón madera con sombra)
        ctx.fillStyle = '#8b4513';
        ctx.fillRect(x - 16, y - h, 5, h);
        ctx.fillRect(x + 11, y - h, 5, h);
        ctx.fillStyle = '#5a2d0a';
        ctx.fillRect(x - 16, y - h, 2, h);
        ctx.fillRect(x + 11, y - h, 2, h);
        // Veta de madera
        ctx.fillStyle = '#aa6633';
        ctx.fillRect(x - 13, y - h + 6, 1, h - 12);
        ctx.fillRect(x + 14, y - h + 6, 1, h - 12);

        // Base ensanchada
        ctx.fillStyle = '#6b3410';
        ctx.fillRect(x - 19, y - 5, 11, 5);
        ctx.fillRect(x + 8,  y - 5, 11, 5);

        // Barra transversal blanca con franjas alternadas
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(x - 19, y - h + 2, 38, 9);
        ctx.fillStyle = '#999';
        ctx.fillRect(x - 19, y - h + 2, 38, 2);
        ctx.fillStyle = '#cc1010';
        ctx.fillRect(x - 17, y - h + 5, 10, 5);
        ctx.fillRect(x + 5,  y - h + 5, 10, 5);
        ctx.fillStyle = '#1155cc';
        ctx.fillRect(x - 5,  y - h + 5, 10, 5);

        // Segunda barra
        ctx.fillStyle = '#dddddd';
        ctx.fillRect(x - 17, y - h + 24, 34, 4);

        // BANDERINES triangulares colgando del poste (con sway sutil)
        const flagColors = ['#ff44aa', '#ffee00', '#00d4ff', '#33ff66'];
        const sway = Math.sin(time * 3) * 0.5;
        for (let i = 0; i < 4; i++) {
            const fx = x - 14 + i * 9;
            const fy = y - h - 6;
            const flagSway = Math.sin(time * 3 + i * 0.5) * 1;
            ctx.fillStyle = flagColors[i];
            // Triángulo decorativo (3 segmentos descendentes)
            ctx.fillRect(fx, fy, 6, 2);
            ctx.fillRect(fx + 1 + flagSway, fy + 2, 4, 2);
            ctx.fillRect(fx + 2 + flagSway, fy + 4, 2, 2);
        }
        // Cuerda que sostiene los banderines
        ctx.fillStyle = '#aa8800';
        ctx.fillRect(x - 16, y - h - 7, 32, 1);

        // ESTRELLA dorada en el centro de la barra
        ctx.fillStyle = '#ffee00';
        ctx.fillRect(x - 1, y - h + 6, 2, 1);
        ctx.fillRect(x - 2, y - h + 7, 4, 1);
        ctx.fillRect(x - 1, y - h + 8, 2, 1);
    }
